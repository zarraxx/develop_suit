name: package_v8

env:
  V8_PACKAGE_VERSION: ${{ inputs.v8_version || '11.6.189.4' }}

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "v8-cmake tag/V8 version to build and publish"
        required: false
        type: string
        default: "11.6.189.4"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Releases as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_V8_VERSION: ${{ inputs.v8_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          v8_version="${INPUT_V8_VERSION:-11.6.189.4}"
          release_tag="v8-${v8_version}"

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

  build-v8:
    name: v8-${{ matrix.target.name }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64
            target: x86_64
            triple: x86_64-unknown-linux-gnu
          - name: aarch64
            target: aarch64
            triple: aarch64-unknown-linux-gnu
          - name: riscv64
            target: riscv64
            triple: riscv64-unknown-linux-gnu
          - name: loongarch64
            target: loongarch64
            triple: loongarch64-unknown-linux-gnu
          - name: mingw64
            target: mingw64
            triple: x86_64-w64-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-v8-cache-v1-${{ env.V8_PACKAGE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-package-v8-cache-
            ${{ runner.os }}-package-nodejs-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-package-llvmsdk-cache-

      - name: Build V8 package
        run: |
          set -euo pipefail

          package_name="v8-${{ env.V8_PACKAGE_VERSION }}-${{ matrix.target.triple }}"

          bash ./packages/v8/build.sh \
            --target="${{ matrix.target.target }}" \
            --v8-version="${{ env.V8_PACKAGE_VERSION }}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs=12

      - name: Upload V8 artifact
        uses: actions/upload-artifact@v7
        with:
          name: v8-${{ matrix.target.name }}
          path: |
            packages/v8/build/dist/v8-${{ env.V8_PACKAGE_VERSION }}-${{ matrix.target.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  test-v8:
    name: test-v8-${{ matrix.target }}
    needs:
      - build-v8
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/amd64
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
            test_mode: linux-docker
            docker_platform: linux/arm64
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/riscv64
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/loong64
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            runs_on: windows-latest
            test_mode: mingw-native
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download V8 artifact
        uses: actions/download-artifact@v8
        with:
          name: v8-${{ matrix.target }}
          path: artifacts

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.test_mode == 'linux-docker' && (matrix.target == 'riscv64' || matrix.target == 'loongarch64') }}
        uses: docker/setup-qemu-action@v3

      - name: Test V8 package in Docker
        if: ${{ matrix.test_mode == 'linux-docker' }}
        run: |
          set -euo pipefail

          archive_path="${GITHUB_WORKSPACE}/artifacts/v8-${{ env.V8_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          docker pull --platform "${{ matrix.docker_platform }}" ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e HOME=/tmp \
            ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8 \
            /bin/bash -lc "bash ./packages/v8/test_package.sh --target=${{ matrix.target }} --archive=/work/artifacts/v8-${{ env.V8_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz"

      - name: Set up MSYS2 for Windows package test
        if: ${{ matrix.test_mode == 'mingw-native' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: tar

      - name: Test V8 package on Windows
        if: ${{ matrix.test_mode == 'mingw-native' }}
        shell: msys2 {0}
        run: |
          set -euo pipefail
          archive_path="artifacts/v8-${{ env.V8_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          bash ./packages/v8/test_package_mingw64.sh \
            --target="${{ matrix.target }}" \
            --archive="${archive_path}"

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - test-v8
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: v8-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "V8 ${{ env.V8_PACKAGE_VERSION }} packages."
          fi

          gh release upload "${RELEASE_TAG}" artifacts/*.tar.xz --clobber
