name: package_boost

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BOOST_PACKAGE_VERSION: ${{ inputs.boost_version || '1.84.0' }}

on:
  workflow_dispatch:
    inputs:
      boost_version:
        description: "Boost version to build and publish"
        required: false
        type: string
        default: "1.84.0"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Releases as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_BOOST_VERSION: ${{ inputs.boost_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          boost_version="${INPUT_BOOST_VERSION:-1.84.0}"
          release_tag="boost-${boost_version}"

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

  build-boost:
    name: boost-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
          - target: mingw64
            triple: x86_64-w64-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-boost-cache-v1
          restore-keys: |
            ${{ runner.os }}-package-boost-cache-
            ${{ runner.os }}-package-python-cache-
            ${{ runner.os }}-package-python-dependencies-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-python-cache-
            ${{ runner.os }}-stage1-cache-

      - name: Build Boost package
        run: |
          set -euo pipefail

          package_name="boost-${{ env.BOOST_PACKAGE_VERSION }}-${{ matrix.triple }}"

          bash ./packages/boost/build.sh \
            --target="${{ matrix.target }}" \
            --boost-version="${{ env.BOOST_PACKAGE_VERSION }}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs=4

      - name: Upload Boost artifact
        uses: actions/upload-artifact@v7
        with:
          name: boost-${{ matrix.target }}
          path: |
            packages/boost/build/dist/boost-${{ env.BOOST_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-boost
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: boost-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "Boost ${{ env.BOOST_PACKAGE_VERSION }} packages."
          fi

          gh release upload "${RELEASE_TAG}" artifacts/*.tar.xz --clobber
