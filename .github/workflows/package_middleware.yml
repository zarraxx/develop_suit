name: package_middleware

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REDIS_PACKAGE_VERSION: ${{ inputs.redis_version || '7.4.9' }}
  GO_PACKAGE_VERSION: ${{ inputs.go_version || '1.25.10' }}
  MINIO_PACKAGE_REF: ${{ inputs.minio_ref || 'RELEASE.2024-06-22T05-26-45Z' }}
  ETCD_PACKAGE_VERSION: ${{ inputs.etcd_version || '3.6.12' }}
  PACKAGE_TEST_IMAGE: ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8

on:
  workflow_dispatch:
    inputs:
      redis_version:
        description: "Redis version to build"
        required: false
        type: string
        default: "7.4.9"
      go_version:
        description: "Go toolchain version for MinIO and etcd"
        required: false
        type: string
        default: "1.25.10"
      minio_ref:
        description: "MinIO tag/ref to build"
        required: false
        type: string
        default: "RELEASE.2024-06-22T05-26-45Z"
      etcd_version:
        description: "etcd version to build"
        required: false
        type: string
        default: "3.6.12"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_date: ${{ steps.meta.outputs.release_date }}
      asset_prefix: ${{ steps.meta.outputs.asset_prefix }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_REDIS_VERSION: ${{ inputs.redis_version }}
          INPUT_GO_VERSION: ${{ inputs.go_version }}
          INPUT_MINIO_REF: ${{ inputs.minio_ref }}
          INPUT_ETCD_VERSION: ${{ inputs.etcd_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          redis_version="${INPUT_REDIS_VERSION:-7.4.9}"
          go_version="${INPUT_GO_VERSION:-1.25.10}"
          minio_ref="${INPUT_MINIO_REF:-RELEASE.2024-06-22T05-26-45Z}"
          etcd_version="${INPUT_ETCD_VERSION:-3.6.12}"
          release_date="$(date -u +%F)"
          release_tag="middleware-${release_date}"

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="middleware ${release_date}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "release_date=${release_date}"
            echo "asset_prefix=middleware"
          } >> "${GITHUB_OUTPUT}"

          echo "Redis ${redis_version}, Go ${go_version}, MinIO ${minio_ref}, etcd ${etcd_version}"

  build-middleware:
    name: middleware-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            jobs: 8
            artifact_name: middleware-x86_64
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            jobs: 8
            artifact_name: middleware-aarch64
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            jobs: 8
            artifact_name: middleware-riscv64
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            jobs: 8
            artifact_name: middleware-loongarch64
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            jobs: 8
            artifact_name: internal-middleware-mingw64-base

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.target == 'aarch64' || matrix.target == 'riscv64' || matrix.target == 'loongarch64' }}
        uses: docker/setup-qemu-action@v3

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-middleware-cache-v1-${{ env.REDIS_PACKAGE_VERSION }}-${{ env.GO_PACKAGE_VERSION }}-${{ env.MINIO_PACKAGE_REF }}-${{ env.ETCD_PACKAGE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-package-middleware-cache-
            ${{ runner.os }}-package-nginx-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-

      - name: Build middleware package
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          package_name="${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}"

          bash ./packages/middleware/build.sh \
            --target="${{ matrix.target }}" \
            --redis-version="${{ env.REDIS_PACKAGE_VERSION }}" \
            --go-version="${{ env.GO_PACKAGE_VERSION }}" \
            --minio-ref="${{ env.MINIO_PACKAGE_REF }}" \
            --etcd-version="${{ env.ETCD_PACKAGE_VERSION }}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs="${{ matrix.jobs }}"

      - name: Verify package permissions
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          package_name="${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}"
          archive_path="packages/middleware/build/dist/${package_name}.tar.xz"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          tar -C "${tmp_dir}" -xf "${archive_path}"

          if find "${tmp_dir}/${package_name}" -type d -perm -0002 -print -quit | grep -q .; then
            echo "world-writable directories found in ${archive_path}" >&2
            find "${tmp_dir}/${package_name}" -type d -perm -0002 -ls >&2
            exit 1
          fi

          if find "${tmp_dir}/${package_name}" -type f -perm -0002 -print -quit | grep -q .; then
            echo "world-writable files found in ${archive_path}" >&2
            find "${tmp_dir}/${package_name}" -type f -perm -0002 -ls >&2
            exit 1
          fi

      - name: Upload middleware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            packages/middleware/build/dist/${{ needs.resolve-meta.outputs.asset_prefix }}-${{ matrix.triple }}-${{ needs.resolve-meta.outputs.release_date }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-redis-mingw64:
    name: redis-mingw64-msys2
    runs-on: windows-latest
    needs: resolve-meta
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: gcc make pkg-config libopenssl openssl-devel tar curl

      - name: Build Redis with MSYS2
        shell: msys2 {0}
        run: |
          set -euo pipefail

          bash ./packages/middleware/build_redis_mingw64_msys2.sh \
            --redis-version="${{ env.REDIS_PACKAGE_VERSION }}" \
            --out-dir="${PWD}/redis-mingw64-msys2" \
            --jobs=8

      - name: Upload Redis MSYS2 artifact
        uses: actions/upload-artifact@v7
        with:
          name: internal-redis-mingw64-msys2
          path: redis-mingw64-msys2
          if-no-files-found: error
          retention-days: 14

  assemble-mingw64:
    name: assemble-mingw64
    runs-on: ubuntu-24.04
    needs:
      - resolve-meta
      - build-middleware
      - build-redis-mingw64
    timeout-minutes: 30

    steps:
      - name: Download MinGW base package
        uses: actions/download-artifact@v8
        with:
          name: internal-middleware-mingw64-base
          path: artifacts/base

      - name: Download Redis MSYS2 package
        uses: actions/download-artifact@v8
        with:
          name: internal-redis-mingw64-msys2
          path: artifacts/redis

      - name: Assemble final MinGW package
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          triple="x86_64-w64-windows-gnu"
          package_name="${ASSET_PREFIX}-${triple}-${RELEASE_DATE}"
          archive_name="${package_name}.tar.xz"
          base_archive="artifacts/base/${archive_name}"
          work_dir="$(mktemp -d)"
          trap 'rm -rf "${work_dir}"' EXIT

          [[ -f "${base_archive}" ]] || {
            echo "missing base MinGW package: ${base_archive}" >&2
            exit 1
          }

          tar -C "${work_dir}" -xf "${base_archive}"
          install -d "${work_dir}/${package_name}/bin" "${work_dir}/${package_name}/conf"
          cp -a artifacts/redis/bin/. "${work_dir}/${package_name}/bin/"
          cp -a artifacts/redis/conf/. "${work_dir}/${package_name}/conf/"

          sed -i 's/^REDIS_STATUS=.*/REDIS_STATUS=enabled-msys2/' "${work_dir}/${package_name}/manifest.env"
          sed -i 's/Redis .*: disabled.*/Redis ${{ env.REDIS_PACKAGE_VERSION }}: enabled via redis-windows MSYS2 build/' "${work_dir}/${package_name}/README.middleware"

          find "${work_dir}/${package_name}" -type d -exec chmod 755 {} +
          find "${work_dir}/${package_name}/bin" -type f -exec chmod 755 {} +
          find "${work_dir}/${package_name}" -type f ! -path "${work_dir}/${package_name}/bin/*" -exec chmod 644 {} +

          tar -C "${work_dir}" -cJf "${archive_name}" "${package_name}"

      - name: Upload final MinGW artifact
        uses: actions/upload-artifact@v7
        with:
          name: middleware-mingw64
          path: middleware-x86_64-w64-windows-gnu-${{ needs.resolve-meta.outputs.release_date }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  test-middleware:
    name: test-middleware-${{ matrix.target }}
    needs:
      - resolve-meta
      - build-middleware
      - assemble-mingw64
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/amd64
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
            test_mode: linux-native
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-qemu
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/loong64
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            runs_on: windows-latest
            test_mode: mingw-native
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download middleware artifact
        uses: actions/download-artifact@v8
        with:
          name: middleware-${{ matrix.target }}
          path: artifacts

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.test_mode == 'linux-docker' && (matrix.target == 'riscv64' || matrix.target == 'loongarch64') }}
        uses: docker/setup-qemu-action@v3

      - name: Test middleware package on Linux VM
        if: ${{ matrix.test_mode == 'linux-native' }}
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          archive_name="${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}.tar.xz"
          archive_path="${GITHUB_WORKSPACE}/artifacts/${archive_name}"
          package_dir="${RUNNER_TEMP}/${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          rm -rf "${package_dir}"
          tar -C "${RUNNER_TEMP}" -xf "${archive_path}"
          bash ./packages/middleware/test_package.sh "${package_dir}"

      - name: Test middleware package with host QEMU
        if: ${{ matrix.test_mode == 'linux-qemu' }}
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          archive_name="${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}.tar.xz"
          archive_path="${GITHUB_WORKSPACE}/artifacts/${archive_name}"
          package_dir="${RUNNER_TEMP}/${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}"
          sysroot_parent="${RUNNER_TEMP}/sysroot"
          sysroot_dir="${sysroot_parent}/${{ matrix.triple }}"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          sudo apt-get update
          sudo apt-get install -y qemu-user

          docker pull --platform linux/amd64 "${{ env.PACKAGE_TEST_IMAGE }}"
          container_id="$(docker create --platform linux/amd64 "${{ env.PACKAGE_TEST_IMAGE }}")"
          trap 'docker rm -f "${container_id}" >/dev/null 2>&1 || true' EXIT
          mkdir -p "${sysroot_parent}"
          docker cp "${container_id}:/opt/sysroot/${{ matrix.triple }}" "${sysroot_parent}/"

          rm -rf "${package_dir}"
          tar -C "${RUNNER_TEMP}" -xf "${archive_path}"

          PACKAGE_QEMU="$(command -v qemu-riscv64)" \
          PACKAGE_QEMU_LD_PREFIX="${sysroot_dir}" \
            bash ./packages/middleware/test_package.sh "${package_dir}"

      - name: Test middleware package in Docker
        if: ${{ matrix.test_mode == 'linux-docker' }}
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          archive_name="${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}.tar.xz"
          archive_path="${GITHUB_WORKSPACE}/artifacts/${archive_name}"
          package_dir="/tmp/${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          docker pull --platform "${{ matrix.docker_platform }}" "${{ env.PACKAGE_TEST_IMAGE }}"
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e HOME=/tmp \
            "${{ env.PACKAGE_TEST_IMAGE }}" \
            /bin/bash -lc "set -euo pipefail; rm -rf '${package_dir}'; tar -C /tmp -xf '/work/artifacts/${archive_name}'; bash ./packages/middleware/test_package.sh '${package_dir}'"

      - name: Set up MSYS2 for Windows package test
        if: ${{ matrix.test_mode == 'mingw-native' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: tar curl

      - name: Test middleware package on Windows
        if: ${{ matrix.test_mode == 'mingw-native' }}
        shell: msys2 {0}
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
        run: |
          set -euo pipefail

          archive_name="${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}.tar.xz"
          archive_path="artifacts/${archive_name}"
          package_dir="${PWD}/${ASSET_PREFIX}-${{ matrix.triple }}-${RELEASE_DATE}"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          rm -rf "${package_dir}"
          tar -C "${PWD}" -xf "${archive_path}"
          bash ./packages/middleware/test_package.sh "${package_dir}"

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - test-middleware
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: middleware-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          RELEASE_DATE: ${{ needs.resolve-meta.outputs.release_date }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          cat >release-notes.md <<EOF
          # Middleware ${RELEASE_DATE}

          Projects:
          - Redis: ${{ env.REDIS_PACKAGE_VERSION }} (Linux cross builds, Windows MSYS2 build)
          - MinIO: ${{ env.MINIO_PACKAGE_REF }}
          - etcd: ${{ env.ETCD_PACKAGE_VERSION }}
          - Go: ${{ env.GO_PACKAGE_VERSION }}

          Artifacts:
          - middleware-x86_64-unknown-linux-gnu-${RELEASE_DATE}.tar.xz
          - middleware-aarch64-unknown-linux-gnu-${RELEASE_DATE}.tar.xz
          - middleware-riscv64-unknown-linux-gnu-${RELEASE_DATE}.tar.xz
          - middleware-loongarch64-unknown-linux-gnu-${RELEASE_DATE}.tar.xz
          - middleware-x86_64-w64-windows-gnu-${RELEASE_DATE}.tar.xz
          EOF

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes-file release-notes.md
          fi

          gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" artifacts/*.tar.xz --clobber
