name: stage1-rootfs

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release and image tag, defaults to stage1-YYYY-MM-DD"
        required: false
        type: string
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_temp_tag_prefix: ${{ steps.meta.outputs.image_temp_tag_prefix }}

    steps:
      - name: Resolve release and image metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          release_tag="${INPUT_RELEASE_TAG}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="stage1-$(date -u +%F)"
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name_lc="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner_lc}/${repo_name_lc}"
          image_temp_tag_prefix="tmp-${GITHUB_RUN_ID}"

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "image_repo=${image_repo}"
            echo "image_temp_tag_prefix=${image_temp_tag_prefix}"
          } >> "${GITHUB_OUTPUT}"

  build-rootfs:
    name: stage1-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache source archives
        uses: actions/cache@v4
        with:
          path: cache
          key: ${{ runner.os }}-stage1-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage1-cache-

      - name: Prepare host tools
        run: |
          bash ./stage1/prepare.sh

      - name: Build stage0 rootfs
        run: |
          bash ./stage0/build.sh \
            --arch="${{ matrix.arch }}" \
            --clean \
            --jobs=4

      - name: Build stage1 rootfs
        run: |
          bash ./stage1/build.sh \
            --arch="${{ matrix.arch }}" \
            --clean \
            --jobs=4

      - name: Build and push stage1 Docker image
        run: |
          bash ./stage1/image.sh \
            --arch="${{ matrix.arch }}" \
            --push \
            --tag="${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-${{ matrix.arch }}"

      - name: Pack rootfs
        run: |
          mkdir -p artifacts
          tar -C dist/stage1 -cJf "artifacts/stage1-rootfs-${{ matrix.arch }}.tar.xz" "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage1-${{ matrix.arch }}
          path: |
            artifacts/stage1-rootfs-${{ matrix.arch }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-image-manifest:
    name: publish-image-manifest
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-rootfs

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          image_repo="${{ needs.resolve-meta.outputs.image_repo }}"
          release_tag="${{ needs.resolve-meta.outputs.release_tag }}"
          image_temp_tag_prefix="${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}"

          docker buildx imagetools create \
            --tag "${image_repo}:${release_tag}" \
            "${image_repo}:${image_temp_tag_prefix}-x86_64" \
            "${image_repo}:${image_temp_tag_prefix}-aarch64" \
            "${image_repo}:${image_temp_tag_prefix}-riscv64" \
            "${image_repo}:${image_temp_tag_prefix}-loongarch64"

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-rootfs
      - publish-image-manifest
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum ./*.tar.xz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-meta.outputs.release_tag }}
          name: ${{ needs.resolve-meta.outputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/SHA256SUMS
