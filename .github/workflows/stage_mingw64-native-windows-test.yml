name: stage_mingw64-native-windows-test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NATIVE_LLVM_VERSION: llvm18.1.8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag containing the Windows-native LLVM archive"
        required: false
        type: string

permissions:
  contents: read

jobs:
  test-windows-native-llvm:
    name: test-windows-native-llvm
    runs-on: windows-2025

    steps:
      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          NATIVE_LLVM_VERSION: ${{ env.NATIVE_LLVM_VERSION }}
        run: |
          $releaseTag = $env:INPUT_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            $releaseTag = gh release list `
              --repo $env:GITHUB_REPOSITORY `
              --limit 100 `
              --json tagName `
              --jq '.[] | select(.tagName | startswith("stage-mingw64-native-")) | .tagName' |
              Select-Object -First 1
          }

          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw "No stage-mingw64-native release tag found"
          }

          $archiveName = "stage-mingw64-native-$env:NATIVE_LLVM_VERSION-x86_64-w64-windows-gnu.tar.xz"
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "archive_name=$archiveName" >> $env:GITHUB_OUTPUT

      - name: Download Windows-native LLVM release archive
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          ARCHIVE_NAME: ${{ steps.meta.outputs.archive_name }}
        run: |
          New-Item -ItemType Directory -Force -Path downloads | Out-Null
          gh release download $env:RELEASE_TAG `
            --repo $env:GITHUB_REPOSITORY `
            --pattern $env:ARCHIVE_NAME `
            --dir downloads

      - name: Extract Windows-native LLVM
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ steps.meta.outputs.archive_name }}
        run: |
          New-Item -ItemType Directory -Force -Path native-llvm | Out-Null
          tar -xJf "downloads/$env:ARCHIVE_NAME" -C native-llvm

      - name: Show clang versions
        shell: pwsh
        run: |
          $llvmRoot = Join-Path $PWD "native-llvm/${{ env.NATIVE_LLVM_VERSION }}"
          $targetBin = Join-Path $llvmRoot "x86_64-w64-windows-gnu/bin"
          (Join-Path $llvmRoot "bin") >> $env:GITHUB_PATH
          if (Test-Path $targetBin) {
            $targetBin >> $env:GITHUB_PATH
          }
          $clang = Join-Path $llvmRoot "bin/x86_64-w64-windows-gnu-clang-gcc.exe"
          $clangxx = Join-Path $llvmRoot "bin/x86_64-w64-windows-gnu-clang-g++.exe"
          & $clang --version
          & $clangxx --version

      - name: Diagnose clang++ cfg variants
        shell: pwsh
        run: |
          $llvmRoot = Join-Path $PWD "native-llvm/${{ env.NATIVE_LLVM_VERSION }}"
          $cfg = Join-Path $llvmRoot "bin/x86_64-w64-windows-gnu-clang-g++.cfg"
          $clangxx = Join-Path $llvmRoot "bin/x86_64-w64-windows-gnu-clang-g++.exe"
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          @'
          #include <iostream>
          #include <string>

          int main() {
            const std::string message = "hello from clang++ cxx";
            std::cout << message << '\n';
            return 0;
          }
          '@ | Set-Content -Encoding ASCII smoke/hello.cpp

          $base = [string[]](Get-Content $cfg)
          $sysrootArg = '<CFGDIR>/../sysroot'
          $sysrootInclude = '<CFGDIR>/../sysroot/usr/x86_64-w64-windows-gnu/include'
          $libcxxInclude = '<CFGDIR>/../include/c++/v1'
          $resourceInclude = '<CFGDIR>/../lib/clang/18/include'

          $crtInclude = Join-Path $llvmRoot "sysroot/usr/x86_64-w64-windows-gnu/include"
          $crtLib = Join-Path $llvmRoot "sysroot/usr/x86_64-w64-windows-gnu/lib"
          foreach ($alias in @("x86_64-w64-mingw32", "x86_64-w64-windows-gnu")) {
            $aliasRoot = Join-Path $llvmRoot "sysroot/$alias"
            $aliasInclude = Join-Path $aliasRoot "include"
            $aliasLib = Join-Path $aliasRoot "lib"
            Remove-Item -LiteralPath $aliasInclude -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $aliasLib -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $aliasInclude | Out-Null
            New-Item -ItemType Directory -Force -Path $aliasLib | Out-Null
            Copy-Item -Recurse -Force (Join-Path $crtInclude "*") $aliasInclude
            Copy-Item -Recurse -Force (Join-Path $crtLib "*") $aliasLib
          }
          Test-Path (Join-Path $llvmRoot "sysroot/x86_64-w64-mingw32/include/crtdefs.h")
          Test-Path (Join-Path $llvmRoot "sysroot/x86_64-w64-mingw32/include/stdlib.h")

          function Insert-AfterLine([string[]]$lines, [string]$needle, [string[]]$insert) {
            $out = [System.Collections.Generic.List[string]]::new()
            $done = $false
            foreach ($line in $lines) {
              $out.Add($line)
              if (-not $done -and $line -eq $needle) {
                foreach ($item in $insert) { $out.Add($item) }
                $done = $true
              }
            }
            return [string[]]$out
          }

          function Remove-OptionPair([string[]]$lines, [string]$option, [string]$value) {
            $out = [System.Collections.Generic.List[string]]::new()
            for ($i = 0; $i -lt $lines.Length; $i++) {
              if ($i -lt ($lines.Length - 1) -and $lines[$i] -eq $option -and $lines[$i + 1] -eq $value) {
                $i++
                continue
              }
              $out.Add($lines[$i])
            }
            return [string[]]$out
          }

          function Run-Variant([string]$name, [string[]]$lines) {
            Write-Host ""
            Write-Host "===== cfg variant: $name ====="
            Set-Content -Encoding ASCII $cfg $lines
            Get-Content $cfg
            Write-Host "----- clang++ -E -v: $name -----"
            & $clangxx -E -x c++ -v smoke/hello.cpp -o NUL
            $preprocessExit = $LASTEXITCODE
            Write-Host "preprocess exit: $preprocessExit"
            Write-Host "----- clang++ -###: $name -----"
            & $clangxx -### smoke/hello.cpp -o "smoke/$name.exe"
            Write-Host "----- clang++ build: $name -----"
            & $clangxx smoke/hello.cpp -o "smoke/$name.exe"
            $buildExit = $LASTEXITCODE
            Write-Host "build exit: $buildExit"
            if ($buildExit -eq 0) {
              & "./smoke/$name.exe"
              Write-Host "variant passed: $name"
              return $true
            }
            return $false
          }

          $sysrootKeepIsystem = Insert-AfterLine $base '-resource-dir=<CFGDIR>/../lib/clang/18' @('--sysroot', $sysrootArg)
          $nostdincxx = Insert-AfterLine $base '-stdlib=libc++' @('-nostdinc++')
          $nostdincxxSysroot = Insert-AfterLine $nostdincxx '-resource-dir=<CFGDIR>/../lib/clang/18' @('--sysroot', $sysrootArg)
          $sysrootNoUserCrt = Remove-OptionPair $sysrootKeepIsystem '-isystem' $sysrootInclude
          $nostdincManual = @(
            '# Default relocatable Windows GNU configuration for x86_64-w64-windows-gnu.',
            '--target=x86_64-w64-windows-gnu',
            '-resource-dir=<CFGDIR>/../lib/clang/18',
            '--sysroot',
            $sysrootArg,
            '-B',
            '<CFGDIR>',
            '-stdlib=libc++',
            '-nostdinc',
            '-isystem',
            $libcxxInclude,
            '-isystem',
            $sysrootInclude,
            '-isystem',
            $resourceInclude,
            '-L',
            '<CFGDIR>/../sysroot/usr/x86_64-w64-windows-gnu/lib',
            '-L',
            '<CFGDIR>/../lib/clang/18/lib/x86_64-w64-windows-gnu',
            '-L',
            '<CFGDIR>/../lib/x86_64-w64-windows-gnu',
            '--rtlib=compiler-rt',
            '--unwindlib=libunwind'
          )

          $passed = $false
          $passed = (Run-Variant 'original' $base) -or $passed
          $passed = (Run-Variant 'sysroot-keep-isystem' $sysrootKeepIsystem) -or $passed
          $passed = (Run-Variant 'nostdincxx' $nostdincxx) -or $passed
          $passed = (Run-Variant 'nostdincxx-sysroot' $nostdincxxSysroot) -or $passed
          $passed = (Run-Variant 'sysroot-no-user-crt' $sysrootNoUserCrt) -or $passed
          Copy-Item -Force (Join-Path $llvmRoot "lib/clang/18/include/__stddef*.h") (Join-Path $llvmRoot "include/c++/v1")
          $passed = (Run-Variant 'sysroot-no-user-crt-stddef-copy' $sysrootNoUserCrt) -or $passed
          $resourceDir = Join-Path $llvmRoot "lib/clang/18/include"
          foreach ($header in @("complex.h", "ctype.h", "errno.h", "fenv.h", "locale.h", "math.h", "stdio.h", "stdlib.h", "string.h", "uchar.h", "wchar.h", "wctype.h")) {
            "#include_next <$header>" | Set-Content -Encoding ASCII (Join-Path $resourceDir $header)
          }
          $passed = (Run-Variant 'sysroot-no-user-crt-resource-c-wrappers' $sysrootNoUserCrt) -or $passed
          Get-ChildItem -File -Path $crtInclude -Filter "*.h" | ForEach-Object {
            $resourceHeader = Join-Path $resourceDir $_.Name
            if (-not (Test-Path $resourceHeader)) {
              "#include_next <$($_.Name)>" | Set-Content -Encoding ASCII $resourceHeader
            }
          }
          $passed = (Run-Variant 'sysroot-no-user-crt-resource-mingw-wrappers' $sysrootNoUserCrt) -or $passed
          Copy-Item -Recurse -Force (Join-Path $crtInclude "*") (Join-Path $llvmRoot "include/c++/v1")
          $passed = (Run-Variant 'sysroot-no-user-crt-libcxx-crt-overlay' $sysrootNoUserCrt) -or $passed
          Rename-Item -Force (Join-Path $llvmRoot "include/c++/v1/module.modulemap") "module.modulemap.disabled"
          Rename-Item -Force (Join-Path $llvmRoot "lib/clang/18/include/module.modulemap") "module.modulemap.disabled"
          $passed = (Run-Variant 'sysroot-no-user-crt-no-modulemap' $sysrootNoUserCrt) -or $passed
          $passed = (Run-Variant 'nostdinc-manual' $nostdincManual) -or $passed
          if (-not $passed) {
            throw "No clang++ cfg variant passed"
          }

      - name: Build and run C hello world
        shell: pwsh
        run: |
          $llvmRoot = Join-Path $PWD "native-llvm/${{ env.NATIVE_LLVM_VERSION }}"
          $clang = Join-Path $llvmRoot "bin/x86_64-w64-windows-gnu-clang-gcc.exe"
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          @'
          #include <stdio.h>

          int main(void) {
            puts("hello from clang c");
            return 0;
          }
          '@ | Set-Content -Encoding ASCII smoke/hello.c
          & $clang smoke/hello.c -o smoke/hello-c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ./smoke/hello-c.exe

      - name: Build and run C++ hello world
        shell: pwsh
        run: |
          $llvmRoot = Join-Path $PWD "native-llvm/${{ env.NATIVE_LLVM_VERSION }}"
          $clangxx = Join-Path $llvmRoot "bin/x86_64-w64-windows-gnu-clang-g++.exe"
          @'
          #include <iostream>
          #include <string>

          int main() {
            const std::string message = "hello from clang++ cxx";
            std::cout << message << '\n';
            return 0;
          }
          '@ | Set-Content -Encoding ASCII smoke/hello.cpp
          & $clangxx smoke/hello.cpp -o smoke/hello-cxx.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ./smoke/hello-cxx.exe
