name: package_postgresql18_dist

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  POSTGRESQL_PACKAGE_VERSION: ${{ inputs.postgresql_version || '18.4' }}
  POSTGIS_DEPENDENCIES_VERSION: ${{ inputs.postgis_dependencies_version || 'gdal-3.13.1-cgal-5.6.3-qhull-2020.2' }}
  GROONGA_PACKAGE_VERSION: ${{ inputs.groonga_version || '16.0.5' }}
  FDW_DEPENDENCIES_VERSION: ${{ inputs.fdw_dependencies_version || 'unixodbc-2.3.14-freetds-1.5.16-mariadb-3.4.9-hiredis-1.4.0-mongo-c-driver-1.30.8' }}
  V8_PACKAGE_VERSION: ${{ inputs.v8_version || '11.6.189.4' }}
  PACKAGE_TEST_IMAGE: ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8

on:
  workflow_dispatch:
    inputs:
      postgresql_version:
        description: "PostgreSQL base package version"
        required: false
        type: string
        default: "18.4"
      postgis_dependencies_version:
        description: "PostGIS dependency release version suffix"
        required: false
        type: string
        default: "gdal-3.13.1-cgal-5.6.3-qhull-2020.2"
      groonga_version:
        description: "Groonga package version"
        required: false
        type: string
        default: "16.0.5"
      fdw_dependencies_version:
        description: "FDW dependency release version suffix"
        required: false
        type: string
        default: "unixodbc-2.3.14-freetds-1.5.16-mariadb-3.4.9-hiredis-1.4.0-mongo-c-driver-1.30.8"
      v8_version:
        description: "V8 package version"
        required: false
        type: string
        default: "11.6.189.4"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Releases as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      postgresql_asset_prefix: ${{ steps.meta.outputs.postgresql_asset_prefix }}
      postgis_dependencies_release_tag: ${{ steps.meta.outputs.postgis_dependencies_release_tag }}
      postgis_dependencies_asset_prefix: ${{ steps.meta.outputs.postgis_dependencies_asset_prefix }}
      groonga_release_tag: ${{ steps.meta.outputs.groonga_release_tag }}
      groonga_asset_prefix: ${{ steps.meta.outputs.groonga_asset_prefix }}
      fdw_dependencies_release_tag: ${{ steps.meta.outputs.fdw_dependencies_release_tag }}
      fdw_dependencies_asset_prefix: ${{ steps.meta.outputs.fdw_dependencies_asset_prefix }}
      v8_release_tag: ${{ steps.meta.outputs.v8_release_tag }}
      v8_asset_prefix: ${{ steps.meta.outputs.v8_asset_prefix }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_POSTGRESQL_VERSION: ${{ inputs.postgresql_version }}
          INPUT_POSTGIS_DEPENDENCIES_VERSION: ${{ inputs.postgis_dependencies_version }}
          INPUT_GROONGA_VERSION: ${{ inputs.groonga_version }}
          INPUT_FDW_DEPENDENCIES_VERSION: ${{ inputs.fdw_dependencies_version }}
          INPUT_V8_VERSION: ${{ inputs.v8_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          postgresql_version="${INPUT_POSTGRESQL_VERSION:-18.4}"
          postgis_dependencies_version="${INPUT_POSTGIS_DEPENDENCIES_VERSION:-gdal-3.13.1-cgal-5.6.3-qhull-2020.2}"
          groonga_version="${INPUT_GROONGA_VERSION:-16.0.5}"
          fdw_dependencies_version="${INPUT_FDW_DEPENDENCIES_VERSION:-unixodbc-2.3.14-freetds-1.5.16-mariadb-3.4.9-hiredis-1.4.0-mongo-c-driver-1.30.8}"
          v8_version="${INPUT_V8_VERSION:-11.6.189.4}"

          release_tag="postgresql18_dist-${postgresql_version}"
          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "postgresql_asset_prefix=postgresql-${postgresql_version}"
            echo "postgis_dependencies_release_tag=postgis_dependencies-${postgis_dependencies_version}"
            echo "postgis_dependencies_asset_prefix=postgis_dependencies"
            echo "groonga_release_tag=groonga-${groonga_version}"
            echo "groonga_asset_prefix=groonga-${groonga_version}"
            echo "fdw_dependencies_release_tag=fdw_dependencies-${fdw_dependencies_version}"
            echo "fdw_dependencies_asset_prefix=fdw_dependencies"
            echo "v8_release_tag=v8-${v8_version}"
            echo "v8_asset_prefix=v8-${v8_version}"
          } >> "${GITHUB_OUTPUT}"

  build-postgresql18-dist:
    name: postgresql18-dist-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            build_kind: linux
            jobs: 4
            with_oracle: true
            with_db2: true
            oracle_basic_url: https://download.oracle.com/otn_software/linux/instantclient/2122000/instantclient-basic-linux.x64-21.22.0.0.0dbru.zip
            oracle_sdk_url: https://download.oracle.com/otn_software/linux/instantclient/2122000/instantclient-sdk-linux.x64-21.22.0.0.0dbru.zip
            db2_cli_url: https://public.dhe.ibm.com/ibmdl/export/pub/software/data/db2/drivers/odbc_cli/v11.5.9/linuxx64_odbc_cli.tar.gz
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            build_kind: linux-cross
            jobs: 4
            with_oracle: true
            with_db2: false
            oracle_basic_url: https://download.oracle.com/otn_software/linux/instantclient/2326200/instantclient-basic-linux.arm64-23.26.2.0.0.zip
            oracle_sdk_url: https://download.oracle.com/otn_software/linux/instantclient/2326200/instantclient-sdk-linux.arm64-23.26.2.0.0.zip
            db2_cli_url: ""
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            build_kind: linux-cross
            jobs: 4
            with_oracle: false
            with_db2: false
            oracle_basic_url: ""
            oracle_sdk_url: ""
            db2_cli_url: ""
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            build_kind: linux-cross
            jobs: 4
            with_oracle: false
            with_db2: false
            oracle_basic_url: ""
            oracle_sdk_url: ""
            db2_cli_url: ""
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            build_kind: mingw64
            jobs: 4
            with_oracle: true
            with_db2: true
            oracle_basic_url: https://download.oracle.com/otn_software/nt/instantclient/2326200/instantclient-basic-windows.x64-23.26.2.0.0.zip
            oracle_sdk_url: https://download.oracle.com/otn_software/nt/instantclient/2326200/instantclient-sdk-windows.x64-23.26.2.0.0.zip
            db2_cli_url: https://public.dhe.ibm.com/ibmdl/export/pub/software/data/db2/drivers/odbc_cli/v11.5.9/ntx64_odbc_cli.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux cross-build prerequisites
        if: ${{ matrix.build_kind == 'linux-cross' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-postgresql18-dist-cache-v1
          restore-keys: |
            ${{ runner.os }}-package-postgresql18-dist-cache-
            ${{ runner.os }}-package-postgresql-cache-
            ${{ runner.os }}-package-postgis-dependencies-cache-
            ${{ runner.os }}-package-fdw-dependencies-cache-
            ${{ runner.os }}-package-v8-cache-
            ${{ runner.os }}-package-groonga-cache-
            ${{ runner.os }}-package-postgresql-dependencies-cache-
            ${{ runner.os }}-stage-mingw64-cache-

      - name: Download package inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TARGET_TRIPLE: ${{ matrix.triple }}
          POSTGRESQL_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.postgresql_asset_prefix }}
          POSTGIS_RELEASE_TAG: ${{ needs.resolve-meta.outputs.postgis_dependencies_release_tag }}
          POSTGIS_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.postgis_dependencies_asset_prefix }}
          GROONGA_RELEASE_TAG: ${{ needs.resolve-meta.outputs.groonga_release_tag }}
          GROONGA_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.groonga_asset_prefix }}
          FDW_RELEASE_TAG: ${{ needs.resolve-meta.outputs.fdw_dependencies_release_tag }}
          FDW_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.fdw_dependencies_asset_prefix }}
          V8_RELEASE_TAG: ${{ needs.resolve-meta.outputs.v8_release_tag }}
          V8_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.v8_asset_prefix }}
        run: |
          set -euo pipefail

          inputs_dir="packages/postgresql18_dist/build/inputs/${TARGET_TRIPLE}"
          mkdir -p "${inputs_dir}"

          download_release_asset() {
            local release_tag="$1"
            local asset_name="$2"
            local dest_dir="$3"

            rm -f "${dest_dir}/${asset_name}"
            for attempt in $(seq 1 72); do
              if gh release download "${release_tag}" \
                --repo "${GH_REPO}" \
                --pattern "${asset_name}" \
                --dir "${dest_dir}"; then
                return 0
              fi

              echo "asset not ready yet: ${release_tag}/${asset_name} (attempt ${attempt}/72)"
              sleep 300
            done

            echo "timed out waiting for asset: ${release_tag}/${asset_name}" >&2
            exit 1
          }

          download_release_asset "postgresql-${{ env.POSTGRESQL_PACKAGE_VERSION }}" "${POSTGRESQL_ASSET_PREFIX}-${TARGET_TRIPLE}.tar.xz" "${inputs_dir}"
          download_release_asset "${POSTGIS_RELEASE_TAG}" "${POSTGIS_ASSET_PREFIX}-${TARGET_TRIPLE}.tar.xz" "${inputs_dir}"
          download_release_asset "${GROONGA_RELEASE_TAG}" "${GROONGA_ASSET_PREFIX}-${TARGET_TRIPLE}.tar.xz" "${inputs_dir}"
          download_release_asset "${FDW_RELEASE_TAG}" "${FDW_ASSET_PREFIX}-${TARGET_TRIPLE}.tar.xz" "${inputs_dir}"
          download_release_asset "${V8_RELEASE_TAG}" "${V8_ASSET_PREFIX}-${TARGET_TRIPLE}.tar.xz" "${inputs_dir}"

      - name: Download vendor archives
        env:
          WITH_ORACLE: ${{ matrix.with_oracle }}
          WITH_DB2: ${{ matrix.with_db2 }}
          ORACLE_BASIC_URL: ${{ matrix.oracle_basic_url }}
          ORACLE_SDK_URL: ${{ matrix.oracle_sdk_url }}
          DB2_CLI_URL: ${{ matrix.db2_cli_url }}
          TARGET_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          vendor_dir="packages/postgresql18_dist/build/vendor/${TARGET_TRIPLE}"
          mkdir -p "${vendor_dir}"

          download_url() {
            local url="$1"
            local output_path="$2"
            curl -fL --retry 8 --retry-delay 5 --retry-all-errors \
              -o "${output_path}" \
              "${url}"
          }

          if [[ "${WITH_ORACLE}" == "true" ]]; then
            download_url "${ORACLE_BASIC_URL}" "${vendor_dir}/$(basename "${ORACLE_BASIC_URL}")"
            download_url "${ORACLE_SDK_URL}" "${vendor_dir}/$(basename "${ORACLE_SDK_URL}")"
          fi

          if [[ "${WITH_DB2}" == "true" ]]; then
            download_url "${DB2_CLI_URL}" "${vendor_dir}/$(basename "${DB2_CLI_URL}")"
          fi

      - name: Build PostgreSQL 18 distribution package
        env:
          TARGET_TRIPLE: ${{ matrix.triple }}
          WITH_ORACLE: ${{ matrix.with_oracle }}
          WITH_DB2: ${{ matrix.with_db2 }}
          ORACLE_BASIC_URL: ${{ matrix.oracle_basic_url }}
          ORACLE_SDK_URL: ${{ matrix.oracle_sdk_url }}
          DB2_CLI_URL: ${{ matrix.db2_cli_url }}
        run: |
          set -euo pipefail

          inputs_dir="packages/postgresql18_dist/build/inputs/${TARGET_TRIPLE}"
          vendor_dir="packages/postgresql18_dist/build/vendor/${TARGET_TRIPLE}"
          postgresql_archive="${inputs_dir}/${{ needs.resolve-meta.outputs.postgresql_asset_prefix }}-${TARGET_TRIPLE}.tar.xz"
          postgis_archive="${inputs_dir}/${{ needs.resolve-meta.outputs.postgis_dependencies_asset_prefix }}-${TARGET_TRIPLE}.tar.xz"
          groonga_archive="${inputs_dir}/${{ needs.resolve-meta.outputs.groonga_asset_prefix }}-${TARGET_TRIPLE}.tar.xz"
          fdw_archive="${inputs_dir}/${{ needs.resolve-meta.outputs.fdw_dependencies_asset_prefix }}-${TARGET_TRIPLE}.tar.xz"
          v8_archive="${inputs_dir}/${{ needs.resolve-meta.outputs.v8_asset_prefix }}-${TARGET_TRIPLE}.tar.xz"

          extra_args=()
          if [[ "${WITH_ORACLE}" == "true" ]]; then
            extra_args+=(
              "--oracle-basic-archive=${vendor_dir}/$(basename "${ORACLE_BASIC_URL}")"
              "--oracle-sdk-archive=${vendor_dir}/$(basename "${ORACLE_SDK_URL}")"
            )
          else
            extra_args+=("--without-oracle-fdw")
          fi

          if [[ "${WITH_DB2}" == "true" ]]; then
            extra_args+=("--db2-cli-archive=${vendor_dir}/$(basename "${DB2_CLI_URL}")")
          else
            extra_args+=("--without-db2-fdw")
          fi

          bash ./packages/postgresql18_dist/build.sh \
            --target="${{ matrix.target }}" \
            --postgresql-version="${{ env.POSTGRESQL_PACKAGE_VERSION }}" \
            --postgis-deps-version="${{ env.POSTGIS_DEPENDENCIES_VERSION }}" \
            --groonga-version="${{ env.GROONGA_PACKAGE_VERSION }}" \
            --v8-version="${{ env.V8_PACKAGE_VERSION }}" \
            --postgresql-archive="${postgresql_archive}" \
            --postgis-deps-archive="${postgis_archive}" \
            --groonga-archive="${groonga_archive}" \
            --fdw-deps-archive="${fdw_archive}" \
            --v8-archive="${v8_archive}" \
            --without-pljava \
            --without-tde \
            "${extra_args[@]}" \
            --clean \
            --pull \
            --jobs="${{ matrix.jobs }}"

      - name: Upload PostgreSQL 18 distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: postgresql18-dist-${{ matrix.target }}
          path: |
            packages/postgresql18_dist/build/dist/postgresql18_dist-${{ matrix.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  test-postgresql18-dist:
    name: test-postgresql18-dist-${{ matrix.target }}
    needs:
      - resolve-meta
      - build-postgresql18-dist
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-native
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
            test_mode: linux-native
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/riscv64
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/loong64
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            runs_on: windows-latest
            test_mode: mingw-native
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download PostgreSQL 18 distribution artifact
        uses: actions/download-artifact@v8
        with:
          name: postgresql18-dist-${{ matrix.target }}
          path: artifacts

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.test_mode == 'linux-docker' }}
        uses: docker/setup-qemu-action@v3

      - name: Test PostgreSQL 18 distribution package on Linux
        if: ${{ matrix.test_mode == 'linux-native' }}
        run: |
          set -euo pipefail

          archive_path="artifacts/postgresql18_dist-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          bash ./packages/postgresql18_dist/test_package.sh \
            --target="${{ matrix.target }}" \
            --archive="${archive_path}"

      - name: Test PostgreSQL 18 distribution package under Docker CPU emulation
        if: ${{ matrix.test_mode == 'linux-docker' }}
        run: |
          set -euo pipefail

          archive_path="${GITHUB_WORKSPACE}/artifacts/postgresql18_dist-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          docker pull --platform "${{ matrix.docker_platform }}" "${{ env.PACKAGE_TEST_IMAGE }}"
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e HOME=/tmp \
            "${{ env.PACKAGE_TEST_IMAGE }}" \
            /bin/bash -lc "
              set -euo pipefail
              mkdir -p /etc /tmp/pgtester-home
              if [[ ! -f /etc/passwd ]]; then
                printf 'root:x:0:0:root:/root:/bin/sh\n' > /etc/passwd
              fi
              if ! grep -q '^pgtester:' /etc/passwd; then
                printf 'pgtester:x:1001:1001:pg tester:/tmp/pgtester-home:/bin/bash\n' >> /etc/passwd
              fi
              if [[ ! -f /etc/group ]]; then
                printf 'root:x:0:\n' > /etc/group
              fi
              if ! grep -q '^pgtester:' /etc/group; then
                printf 'pgtester:x:1001:\n' >> /etc/group
              fi
              chown -R 1001:1001 /tmp/pgtester-home
              exec su -s /bin/bash pgtester -c 'HOME=/tmp/pgtester-home TMPDIR=/tmp bash ./packages/postgresql18_dist/test_package.sh --target=${{ matrix.target }} --archive=/work/artifacts/postgresql18_dist-${{ matrix.triple }}.tar.xz'
            "

      - name: Set up MSYS2 for Windows package test
        if: ${{ matrix.test_mode == 'mingw-native' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: tar

      - name: Test PostgreSQL 18 distribution package on Windows
        if: ${{ matrix.test_mode == 'mingw-native' }}
        shell: msys2 {0}
        run: |
          set -euo pipefail
          archive_path="artifacts/postgresql18_dist-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          bash ./packages/postgresql18_dist/test_package_mingw64.sh \
            --target="${{ matrix.target }}" \
            --archive="${archive_path}"

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - test-postgresql18-dist
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: postgresql18-dist-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "PostgreSQL 18 distribution packages for PostgreSQL ${{ env.POSTGRESQL_PACKAGE_VERSION }}, PostGIS dependencies ${{ env.POSTGIS_DEPENDENCIES_VERSION }}, Groonga ${{ env.GROONGA_PACKAGE_VERSION }}, FDW dependencies ${{ env.FDW_DEPENDENCIES_VERSION }}, and V8 ${{ env.V8_PACKAGE_VERSION }}."
          fi

          gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" artifacts/*.tar.xz --clobber
