name: stage_llvmsdk

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LLVM_SDK_VERSION: 18.1.8

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "Release tag, defaults to llvmsdk-YYYY-MM-DD"
        required: false
        type: string
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      dependency_release_tag:
        description: "Release tag that contains llvm_dependencies-<triple>.tar.xz"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          release_tag="${INPUT_RELEASE_TAG}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="llvmsdk-$(date -u +%F)"
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

  build-sdk:
    name: llvmsdk-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64
          - mingw64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-stage-llvmsdk-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-python-cache-
            ${{ runner.os }}-stage1-cache-

      - name: Download LLVM dependency archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INPUT_DEPENDENCY_RELEASE_TAG: ${{ inputs.dependency_release_tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          dependency_release_tag="${INPUT_DEPENDENCY_RELEASE_TAG}"
          if [[ -z "${dependency_release_tag}" ]]; then
            dependency_release_tag="llvm-dependencies-$(date -u +%F)"
          fi

          case "${TARGET}" in
            x86_64)
              dependency_triple="x86_64-unknown-linux-gnu"
              ;;
            aarch64)
              dependency_triple="aarch64-unknown-linux-gnu"
              ;;
            riscv64)
              dependency_triple="riscv64-unknown-linux-gnu"
              ;;
            loongarch64)
              dependency_triple="loongarch64-unknown-linux-gnu"
              ;;
            mingw64)
              dependency_triple="x86_64-w64-windows-gnu"
              ;;
            *)
              echo "unsupported target: ${TARGET}" >&2
              exit 1
              ;;
          esac

          mkdir -p packages/llvm/build/dist

          dependency_asset="llvm_dependencies-${dependency_triple}.tar.xz"
          for attempt in $(seq 1 72); do
            if gh release download "${dependency_release_tag}" \
              --pattern "${dependency_asset}" \
              --dir packages/llvm/build/dist; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${dependency_release_tag}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${dependency_release_tag}/${dependency_asset}" >&2
          exit 1

      - name: Build LLVM SDK
        run: |
          dependency_archive="$(find packages/llvm/build/dist -maxdepth 1 -name 'llvm_dependencies-*.tar.xz' -print -quit)"
          [[ -n "${dependency_archive}" ]] || {
            echo "missing downloaded llvm dependency archive" >&2
            exit 1
          }

          bash ./packages/llvm/build.sh \
            --target="${{ matrix.target }}" \
            --llvm-version="${{ env.LLVM_SDK_VERSION }}" \
            --dependency-archive="${dependency_archive}" \
            --clean \
            --pull \
            --jobs=4

      - name: Upload LLVM SDK artifact
        uses: actions/upload-artifact@v7
        with:
          name: llvmsdk-${{ matrix.target }}
          path: |
            packages/llvm/build/dist/llvmsdk-${{ env.LLVM_SDK_VERSION }}-*.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-sdk
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: llvmsdk-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "LLVM SDK ${LLVM_SDK_VERSION}"
          fi

          gh release upload "${RELEASE_TAG}" artifacts/*.tar.xz --clobber
