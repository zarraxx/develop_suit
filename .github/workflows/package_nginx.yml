name: package_nginx

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NGINX_PACKAGE_VERSION: ${{ inputs.nginx_version || '1.30.3' }}
  OPENSSL_PACKAGE_VERSION: ${{ inputs.openssl_version || '4.0.1' }}
  PACKAGE_TEST_IMAGE: ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: "nginx version to build"
        required: false
        type: string
        default: "1.30.3"
      openssl_version:
        description: "OpenSSL version to build with ECH support"
        required: false
        type: string
        default: "4.0.1"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      asset_prefix: ${{ steps.meta.outputs.asset_prefix }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_NGINX_VERSION: ${{ inputs.nginx_version }}
          INPUT_OPENSSL_VERSION: ${{ inputs.openssl_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          nginx_version="${INPUT_NGINX_VERSION:-1.30.3}"
          openssl_version="${INPUT_OPENSSL_VERSION:-4.0.1}"
          release_tag="nginx-${nginx_version}-openssl-${openssl_version}"

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "asset_prefix=${release_tag}"
          } >> "${GITHUB_OUTPUT}"

  build-nginx:
    name: nginx-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            jobs: 8
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            jobs: 8
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            jobs: 8
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            jobs: 8
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            jobs: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.target == 'aarch64' || matrix.target == 'riscv64' || matrix.target == 'loongarch64' }}
        uses: docker/setup-qemu-action@v3

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-nginx-cache-v1-${{ env.NGINX_PACKAGE_VERSION }}-${{ env.OPENSSL_PACKAGE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-package-nginx-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-

      - name: Build nginx package
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
        run: |
          set -euo pipefail

          package_name="${ASSET_PREFIX}-${{ matrix.triple }}"

          bash ./packages/nginx/build.sh \
            --target="${{ matrix.target }}" \
            --nginx-version="${{ env.NGINX_PACKAGE_VERSION }}" \
            --openssl-version="${{ env.OPENSSL_PACKAGE_VERSION }}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs="${{ matrix.jobs }}"

      - name: Verify package permissions
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
        run: |
          set -euo pipefail

          package_name="${ASSET_PREFIX}-${{ matrix.triple }}"
          archive_path="packages/nginx/build/dist/${package_name}.tar.xz"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          tar -C "${tmp_dir}" -xf "${archive_path}"

          if find "${tmp_dir}/${package_name}" -type d -perm -0002 -print -quit | grep -q .; then
            echo "world-writable directories found in ${archive_path}" >&2
            find "${tmp_dir}/${package_name}" -type d -perm -0002 -ls >&2
            exit 1
          fi

          if find "${tmp_dir}/${package_name}" -type f -perm -0002 -print -quit | grep -q .; then
            echo "world-writable files found in ${archive_path}" >&2
            find "${tmp_dir}/${package_name}" -type f -perm -0002 -ls >&2
            exit 1
          fi

      - name: Upload nginx artifact
        uses: actions/upload-artifact@v7
        with:
          name: nginx-${{ matrix.target }}
          path: |
            packages/nginx/build/dist/${{ needs.resolve-meta.outputs.asset_prefix }}-${{ matrix.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  test-nginx:
    name: test-nginx-${{ matrix.target }}
    needs:
      - resolve-meta
      - build-nginx
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/amd64
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
            test_mode: linux-docker
            docker_platform: linux/arm64
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/riscv64
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/loong64
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            runs_on: windows-latest
            test_mode: mingw-native
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download nginx artifact
        uses: actions/download-artifact@v8
        with:
          name: nginx-${{ matrix.target }}
          path: artifacts

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.test_mode == 'linux-docker' && (matrix.target == 'riscv64' || matrix.target == 'loongarch64') }}
        uses: docker/setup-qemu-action@v3

      - name: Test nginx package in Docker
        if: ${{ matrix.test_mode == 'linux-docker' }}
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
        run: |
          set -euo pipefail

          archive_name="${ASSET_PREFIX}-${{ matrix.triple }}.tar.xz"
          archive_path="${GITHUB_WORKSPACE}/artifacts/${archive_name}"
          package_dir="/tmp/${ASSET_PREFIX}-${{ matrix.triple }}"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          docker pull --platform "${{ matrix.docker_platform }}" "${{ env.PACKAGE_TEST_IMAGE }}"
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e HOME=/tmp \
            "${{ env.PACKAGE_TEST_IMAGE }}" \
            /bin/bash -lc "set -euo pipefail; rm -rf '${package_dir}'; tar -C /tmp -xf '/work/artifacts/${archive_name}'; bash ./packages/nginx/test_package.sh '${package_dir}'"

      - name: Set up MSYS2 for Windows package test
        if: ${{ matrix.test_mode == 'mingw-native' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: tar

      - name: Test nginx package on Windows
        if: ${{ matrix.test_mode == 'mingw-native' }}
        shell: msys2 {0}
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
        run: |
          set -euo pipefail

          archive_name="${ASSET_PREFIX}-${{ matrix.triple }}.tar.xz"
          archive_path="artifacts/${archive_name}"
          package_dir="${PWD}/${ASSET_PREFIX}-${{ matrix.triple }}"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          rm -rf "${package_dir}"
          tar -C "${PWD}" -xf "${archive_path}"
          bash ./packages/nginx/test_package.sh "${package_dir}"

  service-test-nginx-linux-x64:
    name: service-test-nginx-linux-x64
    runs-on: ubuntu-24.04
    needs:
      - resolve-meta
      - test-nginx
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download x64 Linux nginx artifact
        uses: actions/download-artifact@v8
        with:
          name: nginx-x86_64
          path: artifacts

      - name: Install, start, and uninstall nginx systemd service
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
        run: |
          set -euo pipefail

          service_name="nginx-ci"
          archive_name="${ASSET_PREFIX}-x86_64-unknown-linux-gnu.tar.xz"
          archive_path="${PWD}/artifacts/${archive_name}"
          package_dir="${PWD}/${ASSET_PREFIX}-x86_64-unknown-linux-gnu"

          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          cleanup() {
            if [[ -x "${package_dir}/uninstall_service.sh" ]]; then
              sudo "${package_dir}/uninstall_service.sh" "${service_name}" || true
            fi
          }
          trap cleanup EXIT

          rm -rf "${package_dir}"
          tar -C "${PWD}" -xf "${archive_path}"
          sed -i 's/listen 8080;/listen 127.0.0.1:18080;/' "${package_dir}/conf/nginx.conf"

          sudo "${package_dir}/install_service.sh" "${service_name}" nginx
          sudo systemctl start "${service_name}"
          sudo systemctl status "${service_name}" --no-pager

          "${package_dir}/bin/curl_static" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 10 \
            --retry-delay 1 \
            -fsS "http://127.0.0.1:18080/" \
            | grep -q "Welcome to nginx"

          sudo bash ./packages/nginx/test_package.sh "${package_dir}" 28080 27890 28443

          sudo "${package_dir}/uninstall_service.sh" "${service_name}"
          trap - EXIT

          if systemctl is-active --quiet "${service_name}"; then
            echo "service is still active after uninstall: ${service_name}" >&2
            exit 1
          fi

  service-test-nginx-windows-x64:
    name: service-test-nginx-windows-x64
    runs-on: windows-latest
    needs:
      - resolve-meta
      - test-nginx
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download x64 Windows nginx artifact
        uses: actions/download-artifact@v8
        with:
          name: nginx-mingw64
          path: artifacts

      - name: Set up MSYS2 for service test script
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: tar

      - name: Install, start, and uninstall nginx WinSW service
        shell: pwsh
        env:
          ASSET_PREFIX: ${{ needs.resolve-meta.outputs.asset_prefix }}
        run: |
          $ErrorActionPreference = 'Stop'

          $serviceName = 'nginx-ci'
          $archiveName = "${env:ASSET_PREFIX}-x86_64-w64-windows-gnu.tar.xz"
          $archivePath = Join-Path $PWD "artifacts\$archiveName"
          $packageDir = Join-Path $PWD "${env:ASSET_PREFIX}-x86_64-w64-windows-gnu"

          if (-not (Test-Path $archivePath)) {
            throw "missing package artifact: $archivePath"
          }

          function Invoke-CmdChecked {
            param([Parameter(Mandatory = $true)][string]$Command)

            & cmd.exe /c $Command
            if ($LASTEXITCODE -ne 0) {
              throw "command failed with exit code ${LASTEXITCODE}: $Command"
            }
          }

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          tar -C $PWD -xf $archivePath
          $configPath = Join-Path $packageDir 'conf\nginx.conf'
          (Get-Content $configPath) -replace 'listen 8080;', 'listen 127.0.0.1:18080;' | Set-Content $configPath

          $nginx = Join-Path $packageDir 'sbin\nginx.exe'
          & $nginx -p "$packageDir\" -c 'conf/nginx.conf' -e 'logs/error.log' -t
          if ($LASTEXITCODE -ne 0) {
            throw "nginx config test failed with exit code $LASTEXITCODE"
          }

          try {
            Invoke-CmdChecked "`"$packageDir\install_service.cmd`" $serviceName"
            Start-Service -Name $serviceName
            $runningService = Get-Service -Name $serviceName
            $runningService.WaitForStatus('Running', [TimeSpan]::FromSeconds(30))
            Get-Service -Name $serviceName

            $curl = Join-Path $packageDir 'bin\curl_static.exe'
            $response = & $curl `
              --connect-timeout 10 `
              --max-time 30 `
              --retry 10 `
              --retry-delay 1 `
              -fsS 'http://127.0.0.1:18080/'
            if ($LASTEXITCODE -ne 0) {
              throw "curl_static failed with exit code $LASTEXITCODE"
            }
            $responseText = $response | Out-String
            if ($responseText -notmatch 'Welcome to nginx') {
              throw "nginx welcome page check failed"
            }

            $workspaceForBash = $env:GITHUB_WORKSPACE.Replace('\', '/')
            $packageDirForBash = $packageDir.Replace('\', '/')
            & C:\msys64\usr\bin\bash.exe -lc "cd '${workspaceForBash}' && bash ./packages/nginx/test_package.sh '${packageDirForBash}' 28080 27890 28443"
            if ($LASTEXITCODE -ne 0) {
              throw "test_package.sh failed with exit code $LASTEXITCODE"
            }
          } finally {
            foreach ($logDir in @((Join-Path $packageDir 'logs'), (Join-Path $packageDir "service\$serviceName"))) {
              if (Test-Path $logDir) {
                Get-ChildItem -Path $logDir -File -ErrorAction SilentlyContinue |
                  Where-Object { $_.Extension -in @('.log', '.out', '.err', '.xml') } |
                  ForEach-Object {
                  Write-Host "----- $($_.FullName) -----"
                  Get-Content $_.FullName -ErrorAction SilentlyContinue
                }
              }
            }
            $uninstallScript = Join-Path $packageDir 'uninstall_service.cmd'
            if (Test-Path $uninstallScript) {
              & cmd.exe /c "`"$uninstallScript`" $serviceName"
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "service uninstall exited with code $LASTEXITCODE"
              }
            }
          }

          $serviceRemoved = $false
          for ($i = 0; $i -lt 15; $i++) {
            $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
            if ($null -eq $service) {
              $serviceRemoved = $true
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not $serviceRemoved) {
            throw "service still exists after uninstall: $serviceName"
          }

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - test-nginx
      - service-test-nginx-linux-x64
      - service-test-nginx-windows-x64
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: nginx-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "nginx ${{ env.NGINX_PACKAGE_VERSION }} packages built with OpenSSL ${{ env.OPENSSL_PACKAGE_VERSION }}."
          fi

          gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" artifacts/*.tar.xz --clobber
