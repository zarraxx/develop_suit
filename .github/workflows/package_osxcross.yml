name: package_osxcross

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LLVM_SDK_VERSION: 18.1.8

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "Release tag"
        required: false
        type: string
        default: osxcross-MacOSX13.3
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      dependency_release_tag:
        description: "Release tag that contains llvm_dependencies-<triple>.tar.xz"
        required: false
        type: string
        default: llvm-dependencies-18.1.8
      llvmsdk_release_tag:
        description: "Release tag that contains llvmsdk-18.1.8-<triple>.tar.xz"
        required: false
        type: string
        default: llvmsdk-18.1.8
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_RELEASE_TAG}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="osxcross-MacOSX13.3"
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

  build-osxcross:
    name: osxcross-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-osxcross-cache-v1
          restore-keys: |
            ${{ runner.os }}-package-osxcross-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-

      - name: Download LLVM dependency and SDK archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TARGET: ${{ matrix.target }}
          DEPENDENCY_RELEASE_TAG: ${{ inputs.dependency_release_tag }}
          LLVMSDK_RELEASE_TAG: ${{ inputs.llvmsdk_release_tag }}
          LLVM_SDK_VERSION: ${{ env.LLVM_SDK_VERSION }}
        run: |
          set -euo pipefail

          case "${TARGET}" in
            x86_64)
              triple="x86_64-unknown-linux-gnu"
              ;;
            aarch64)
              triple="aarch64-unknown-linux-gnu"
              ;;
            riscv64)
              triple="riscv64-unknown-linux-gnu"
              ;;
            loongarch64)
              triple="loongarch64-unknown-linux-gnu"
              ;;
            *)
              echo "unsupported target: ${TARGET}" >&2
              exit 1
              ;;
          esac

          mkdir -p "tmp/osxcross-inputs/${TARGET}"

          dependency_asset="llvm_dependencies-${triple}.tar.xz"
          llvmsdk_asset="llvmsdk-${LLVM_SDK_VERSION}-${triple}.tar.xz"

          gh release download "${DEPENDENCY_RELEASE_TAG}" \
            --pattern "${dependency_asset}" \
            --dir "tmp/osxcross-inputs/${TARGET}"
          gh release download "${LLVMSDK_RELEASE_TAG}" \
            --pattern "${llvmsdk_asset}" \
            --dir "tmp/osxcross-inputs/${TARGET}"

      - name: Build osxcross package
        run: |
          set -euo pipefail

          target="${{ matrix.target }}"
          input_dir="tmp/osxcross-inputs/${target}"
          dependency_archive="$(find "${input_dir}" -maxdepth 1 -name 'llvm_dependencies-*.tar.xz' -print -quit)"
          llvmsdk_archive="$(find "${input_dir}" -maxdepth 1 -name 'llvmsdk-*.tar.xz' -print -quit)"

          [[ -n "${dependency_archive}" ]] || {
            echo "missing downloaded llvm dependency archive" >&2
            exit 1
          }
          [[ -n "${llvmsdk_archive}" ]] || {
            echo "missing downloaded llvmsdk archive" >&2
            exit 1
          }

          bash ./packages/osxcross/build.sh \
            --arch="${target}" \
            --llvm-version="${{ env.LLVM_SDK_VERSION }}" \
            --llvm-deps-archive="${dependency_archive}" \
            --llvmsdk-archive="${llvmsdk_archive}" \
            --clean \
            --pull \
            --jobs=4

      - name: Upload osxcross artifact
        uses: actions/upload-artifact@v7
        with:
          name: osxcross-${{ matrix.target }}
          path: |
            packages/osxcross/build/dist/osxcross-${{ env.LLVM_SDK_VERSION }}-*.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-osxcross
    if: ${{ inputs.publish_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: osxcross-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes-file packages/osxcross/release-notes/MacOSX13.3.md
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes-file packages/osxcross/release-notes/MacOSX13.3.md
          fi

          gh release upload "${RELEASE_TAG}" artifacts/*.tar.xz --clobber
