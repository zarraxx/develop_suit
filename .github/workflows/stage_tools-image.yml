name: stage_tools-image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LLVM_IMAGE_TAG: llvm-18.1.8

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      stable_tag: ${{ steps.meta.outputs.stable_tag }}
      dated_tag: ${{ steps.meta.outputs.dated_tag }}
      image_temp_tag_prefix: ${{ steps.meta.outputs.image_temp_tag_prefix }}

    steps:
      - name: Resolve image metadata
        id: meta
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          LLVM_IMAGE_TAG: ${{ env.LLVM_IMAGE_TAG }}
        run: |
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name_lc="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner_lc}/${repo_name_lc}"
          stable_tag="${LLVM_IMAGE_TAG}"
          dated_tag="${LLVM_IMAGE_TAG}-$(date -u +%F)"
          image_temp_tag_prefix="tmp-stage-tools-${GITHUB_RUN_ID}"

          {
            echo "image_repo=${image_repo}"
            echo "stable_tag=${stable_tag}"
            echo "dated_tag=${dated_tag}"
            echo "image_temp_tag_prefix=${image_temp_tag_prefix}"
          } >> "${GITHUB_OUTPUT}"

  build-image:
    name: stage_tools-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64,riscv64,loong64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-stage-tools-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage-tools-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-python-cache-
            ${{ runner.os }}-stage1-cache-
            ${{ runner.os }}-stage0-cache-

      - name: Build stage_tools rootfs overlay
        run: |
          bash ./stages/stage_tools/build.sh \
            --arch="${{ matrix.arch }}" \
            --clean \
            --pull \
            --jobs=4

      - name: Build, test, and push stage_tools Docker image
        run: |
          bash ./stages/stage_tools/image.sh \
            --arch="${{ matrix.arch }}" \
            --push \
            --tag="${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-${{ matrix.arch }}"

  publish-image-manifest:
    name: publish-image-manifest
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-image

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image tags
        run: |
          image_repo="${{ needs.resolve-meta.outputs.image_repo }}"
          stable_tag="${{ needs.resolve-meta.outputs.stable_tag }}"
          dated_tag="${{ needs.resolve-meta.outputs.dated_tag }}"
          image_temp_tag_prefix="${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}"

          docker buildx imagetools create \
            --tag "${image_repo}:${stable_tag}" \
            --tag "${image_repo}:${dated_tag}" \
            "${image_repo}:${image_temp_tag_prefix}-x86_64" \
            "${image_repo}:${image_temp_tag_prefix}-aarch64" \
            "${image_repo}:${image_temp_tag_prefix}-riscv64" \
            "${image_repo}:${image_temp_tag_prefix}-loongarch64"

      - name: Delete temporary per-arch image tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          package_name="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          image_temp_tag_prefix="${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}"

          api_base="/users/${owner_lc}/packages/container/${package_name}"
          if ! gh api "${api_base}" >/dev/null 2>&1; then
            api_base="/orgs/${owner_lc}/packages/container/${package_name}"
            gh api "${api_base}" >/dev/null
          fi

          for arch in x86_64 aarch64 riscv64 loongarch64; do
            tag="${image_temp_tag_prefix}-${arch}"
            version_id="$(
              gh api --paginate "${api_base}/versions?per_page=100" \
                | jq -rs --arg tag "${tag}" 'flatten | map(select((.metadata.container.tags // []) as $tags | ($tags | length == 1) and ($tags[0] == $tag)) | .id) | first // empty'
            )"

            if [[ -z "${version_id}" ]]; then
              echo "temporary image tag not found or not temp-only: ${tag}"
              continue
            fi

            echo "Deleting temporary image tag ${tag} (version ${version_id})"
            gh api --method DELETE "${api_base}/versions/${version_id}"
          done
