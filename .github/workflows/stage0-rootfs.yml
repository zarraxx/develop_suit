name: stage0-rootfs

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag, defaults to stage0-rootfs-YYYY-MM-DD"
        required: false
        type: string
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false
  # push:
  #   paths:
  #     - ".github/workflows/stage0-rootfs.yml"
  #     - "stage0/**"
  #     - ".gitignore"
  #     - "README.md"
  # pull_request:
  #   paths:
  #     - ".github/workflows/stage0-rootfs.yml"
  #     - "stage0/**"
  #     - ".gitignore"
  #     - "README.md"

permissions:
  contents: write

jobs:
  build-rootfs:
    name: rootfs-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache stage0 archives
        uses: actions/cache@v4
        with:
          path: cache
          key: ${{ runner.os }}-stage0-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage0-cache-

      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            bzip2 \
            ca-certificates \
            cmake \
            make \
            tar \
            xz-utils

      - name: Build stage0 rootfs
        run: |
          bash ./stage0/build.sh \
            --arch="${{ matrix.arch }}" \
            --clean \
            --jobs=4

      - name: Pack rootfs
        run: |
          mkdir -p artifacts
          tar -C dist/sysroot -czf "artifacts/stage0-rootfs-${{ matrix.arch }}.tar.gz" "${{ matrix.arch }}"

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage0-rootfs-${{ matrix.arch }}
          path: artifacts/stage0-rootfs-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-rootfs
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download rootfs artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release metadata
        id: release_meta
        run: |
          release_tag="${{ inputs.release_tag }}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="stage0-rootfs-$(date -u +%F)"
          fi

          release_name="${{ inputs.release_name }}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "tag=${release_tag}"
            echo "name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum ./*.tar.gz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/SHA256SUMS
