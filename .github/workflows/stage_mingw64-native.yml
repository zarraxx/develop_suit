name: stage_mingw64-native

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MINGW64_IMAGE_TAG: llvm-with-mingw64-18.1.8
  NATIVE_LLVM_VERSION: 18.1.8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, defaults to stage-mingw64-native-YYYY-MM-DD"
        required: false
        type: string
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      stable_tag: ${{ steps.meta.outputs.stable_tag }}
      dated_tag: ${{ steps.meta.outputs.dated_tag }}
      image_temp_tag_prefix: ${{ steps.meta.outputs.image_temp_tag_prefix }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Resolve image and release metadata
        id: meta
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          MINGW64_IMAGE_TAG: ${{ env.MINGW64_IMAGE_TAG }}
        run: |
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name_lc="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner_lc}/${repo_name_lc}"
          stable_tag="${MINGW64_IMAGE_TAG}"
          dated_tag="${MINGW64_IMAGE_TAG}-$(date -u +%F)"
          image_temp_tag_prefix="tmp-stage-mingw64-${GITHUB_RUN_ID}"

          release_tag="${INPUT_RELEASE_TAG}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="stage-mingw64-native-$(date -u +%F)"
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "image_repo=${image_repo}"
            echo "stable_tag=${stable_tag}"
            echo "dated_tag=${dated_tag}"
            echo "image_temp_tag_prefix=${image_temp_tag_prefix}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

  build-image:
    name: stage_mingw64-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64,riscv64,loong64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-stage-mingw64-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-tools-cache-

      - name: Build stage_mingw64 rootfs overlay
        run: |
          bash ./stage-mingw64/build.sh \
            --arch="${{ matrix.arch }}" \
            --clean \
            --pull \
            --jobs=4

      - name: Build, test, and push stage_mingw64 Docker image
        run: |
          bash ./stage-mingw64/image.sh \
            --arch="${{ matrix.arch }}" \
            --push \
            --tag="${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-${{ matrix.arch }}"

  package-linux-release:
    name: package-linux-release-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    needs:
      - resolve-meta
      - build-image
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack Linux LLVM and mingw64 sysroot release archives
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_REF: ${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-${{ matrix.arch }}
          NATIVE_LLVM_VERSION: ${{ env.NATIVE_LLVM_VERSION }}
        run: |
          set -euo pipefail

          case "${ARCH}" in
            x86_64)
              platform="linux/amd64"
              ;;
            aarch64)
              platform="linux/arm64"
              ;;
            riscv64)
              platform="linux/riscv64"
              ;;
            loongarch64)
              platform="linux/loong64"
              ;;
            *)
              echo "unsupported arch: ${ARCH}" >&2
              exit 1
              ;;
          esac

          llvm_version="${NATIVE_LLVM_VERSION#llvm}"
          llvm_install_dir="llvm-${llvm_version}"
          llvm_resource_version="${llvm_version%%.*}"
          linux_llvm_root="llvm-${NATIVE_LLVM_VERSION}-${ARCH}-unknown-linux-gnu"
          mingw_sysroot_root="mingw64-sysroot-${ARCH}-unknown-linux-gnu"
          package_dir="artifacts/package-${ARCH}"
          container_id=""

          rm -rf "${package_dir}"
          mkdir -p "${package_dir}/${linux_llvm_root}" "${package_dir}/${mingw_sysroot_root}" artifacts

          docker pull --platform "${platform}" "${IMAGE_REF}"
          container_id="$(docker create --platform "${platform}" "${IMAGE_REF}")"
          trap 'if [[ -n "${container_id}" ]]; then docker rm -f "${container_id}" >/dev/null 2>&1 || true; fi' EXIT

          docker cp "${container_id}:/opt/${llvm_install_dir}/." "${package_dir}/${linux_llvm_root}/"
          docker cp "${container_id}:/opt/x86_64-w64-windows-gnu/." "${package_dir}/${mingw_sysroot_root}/"

          cat >"${package_dir}/${linux_llvm_root}/bin/x86_64-w64-windows-gnu-clang-gcc.cfg" <<EOF
          # Default Windows GNU cross configuration for x86_64-w64-windows-gnu.
          --target=x86_64-w64-windows-gnu
          --sysroot=<CFGDIR>/../../${mingw_sysroot_root}/sysroot
          -resource-dir=<CFGDIR>/../lib/clang/${llvm_resource_version}
          -B
          <CFGDIR>/../../${mingw_sysroot_root}/bin
          -isystem
          <CFGDIR>/../../${mingw_sysroot_root}/sysroot/usr/x86_64-w64-windows-gnu/include
          -L
          <CFGDIR>/../../${mingw_sysroot_root}/sysroot/usr/x86_64-w64-windows-gnu/lib
          -L
          <CFGDIR>/../lib/clang/${llvm_resource_version}/lib/x86_64-w64-windows-gnu
          -L
          <CFGDIR>/../../${mingw_sysroot_root}/lib
          --rtlib=compiler-rt
          --unwindlib=libunwind
          EOF

          cat >"${package_dir}/${linux_llvm_root}/bin/x86_64-w64-windows-gnu-clang-g++.cfg" <<EOF
          # Default Windows GNU cross configuration for x86_64-w64-windows-gnu.
          --target=x86_64-w64-windows-gnu
          --sysroot=<CFGDIR>/../../${mingw_sysroot_root}/sysroot
          -resource-dir=<CFGDIR>/../lib/clang/${llvm_resource_version}
          -B
          <CFGDIR>/../../${mingw_sysroot_root}/bin
          -stdlib=libc++
          -isystem
          <CFGDIR>/../../${mingw_sysroot_root}/include/c++/v1
          -isystem
          <CFGDIR>/../../${mingw_sysroot_root}/sysroot/usr/x86_64-w64-windows-gnu/include
          -L
          <CFGDIR>/../../${mingw_sysroot_root}/sysroot/usr/x86_64-w64-windows-gnu/lib
          -L
          <CFGDIR>/../lib/clang/${llvm_resource_version}/lib/x86_64-w64-windows-gnu
          -L
          <CFGDIR>/../../${mingw_sysroot_root}/lib
          --rtlib=compiler-rt
          --unwindlib=libunwind
          EOF

          tar -C "${package_dir}" -cJf "artifacts/${linux_llvm_root}.tar.xz" "${linux_llvm_root}"
          tar -C "${package_dir}" -cJf "artifacts/${mingw_sysroot_root}.tar.xz" "${mingw_sysroot_root}"

      - name: Pack Linux sysroot release archive
        if: ${{ matrix.arch == 'x86_64' }}
        env:
          IMAGE_REF: ${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-${{ matrix.arch }}
        run: |
          set -euo pipefail

          package_dir="artifacts/package-linux-sysroot"
          container_id=""

          rm -rf "${package_dir}"
          mkdir -p "${package_dir}/linux-sysroot" artifacts

          docker pull --platform linux/amd64 "${IMAGE_REF}"
          container_id="$(docker create --platform linux/amd64 "${IMAGE_REF}")"
          trap 'if [[ -n "${container_id}" ]]; then docker rm -f "${container_id}" >/dev/null 2>&1 || true; fi' EXIT

          docker cp "${container_id}:/opt/sysroot/." "${package_dir}/linux-sysroot/"
          tar -C "${package_dir}" -cJf "artifacts/linux-sysroot.tar.xz" linux-sysroot

      - name: Upload Linux LLVM and mingw64 sysroot artifacts
        uses: actions/upload-artifact@v7
        with:
          name: stage-mingw64-release-${{ matrix.arch }}
          path: |
            artifacts/llvm-${{ env.NATIVE_LLVM_VERSION }}-${{ matrix.arch }}-unknown-linux-gnu.tar.xz
            artifacts/mingw64-sysroot-${{ matrix.arch }}-unknown-linux-gnu.tar.xz
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux sysroot artifact
        if: ${{ matrix.arch == 'x86_64' }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-sysroot
          path: artifacts/linux-sysroot.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-image-manifest:
    name: publish-image-manifest
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-image

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image tags
        run: |
          image_repo="${{ needs.resolve-meta.outputs.image_repo }}"
          stable_tag="${{ needs.resolve-meta.outputs.stable_tag }}"
          dated_tag="${{ needs.resolve-meta.outputs.dated_tag }}"
          image_temp_tag_prefix="${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}"

          docker buildx imagetools create \
            --tag "${image_repo}:${stable_tag}" \
            --tag "${image_repo}:${dated_tag}" \
            "${image_repo}:${image_temp_tag_prefix}-x86_64" \
            "${image_repo}:${image_temp_tag_prefix}-aarch64" \
            "${image_repo}:${image_temp_tag_prefix}-riscv64" \
            "${image_repo}:${image_temp_tag_prefix}-loongarch64"

  build-native-llvm:
    name: build-native-llvm
    runs-on: ubuntu-24.04
    needs:
      - resolve-meta
      - build-image

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-stage-mingw64-native-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage-mingw64-native-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-

      - name: Build Windows-native LLVM/Clang
        run: |
          bash ./stage-mingw64/build_mingw64_native.sh \
            --clean \
            --pull \
            --jobs=4 \
            --image="${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-x86_64"

      - name: Pack Windows-native LLVM/Clang
        run: |
          set -euo pipefail

          archive_root="llvm-${{ env.NATIVE_LLVM_VERSION }}-mingw64--x86_64-w64-windows-gnu"
          package_dir="artifacts/package-native"

          rm -rf "${package_dir}"
          mkdir -p "${package_dir}/${archive_root}" artifacts
          cp -a "stage-mingw64/build/out/mingw64-native/llvm${{ env.NATIVE_LLVM_VERSION }}/." "${package_dir}/${archive_root}/"
          tar -C "${package_dir}" -cJf "artifacts/${archive_root}.tar.xz" "${archive_root}"

      - name: Upload native LLVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: llvm-${{ env.NATIVE_LLVM_VERSION }}-mingw64
          path: artifacts/llvm-${{ env.NATIVE_LLVM_VERSION }}-mingw64--x86_64-w64-windows-gnu.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - package-linux-release
      - build-native-llvm

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum ./*.tar.xz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-meta.outputs.release_tag }}
          name: ${{ needs.resolve-meta.outputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/SHA256SUMS

  cleanup-temp-image-tags:
    name: cleanup-temp-image-tags
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - publish-image-manifest
      - package-linux-release
      - build-native-llvm

    steps:
      - name: Delete temporary per-arch image tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          package_name="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          image_temp_tag_prefix="${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}"

          api_base="/users/${owner_lc}/packages/container/${package_name}"
          if ! gh api "${api_base}" >/dev/null 2>&1; then
            api_base="/orgs/${owner_lc}/packages/container/${package_name}"
            gh api "${api_base}" >/dev/null
          fi

          for arch in x86_64 aarch64 riscv64 loongarch64; do
            tag="${image_temp_tag_prefix}-${arch}"
            version_id="$(
              gh api --paginate "${api_base}/versions?per_page=100" \
                | jq -rs --arg tag "${tag}" 'flatten | map(select((.metadata.container.tags // []) as $tags | ($tags | length == 1) and ($tags[0] == $tag)) | .id) | first // empty'
            )"

            if [[ -z "${version_id}" ]]; then
              echo "temporary image tag not found or not temp-only: ${tag}"
              continue
            fi

            echo "Deleting temporary image tag ${tag} (version ${version_id})"
            gh api --method DELETE "${api_base}/versions/${version_id}"
          done
