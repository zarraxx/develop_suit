name: stage_mingw64-native

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MINGW64_IMAGE_TAG: llvm-with-mingw64-18.1.8
  NATIVE_LLVM_VERSION: llvm18.1.8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, defaults to stage-mingw64-native-YYYY-MM-DD"
        required: false
        type: string
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      stable_tag: ${{ steps.meta.outputs.stable_tag }}
      dated_tag: ${{ steps.meta.outputs.dated_tag }}
      image_temp_tag_prefix: ${{ steps.meta.outputs.image_temp_tag_prefix }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Resolve image and release metadata
        id: meta
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          MINGW64_IMAGE_TAG: ${{ env.MINGW64_IMAGE_TAG }}
        run: |
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name_lc="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner_lc}/${repo_name_lc}"
          stable_tag="${MINGW64_IMAGE_TAG}"
          dated_tag="${MINGW64_IMAGE_TAG}-$(date -u +%F)"
          image_temp_tag_prefix="tmp-stage-mingw64-${GITHUB_RUN_ID}"

          release_tag="${INPUT_RELEASE_TAG}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="stage-mingw64-native-$(date -u +%F)"
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          {
            echo "image_repo=${image_repo}"
            echo "stable_tag=${stable_tag}"
            echo "dated_tag=${dated_tag}"
            echo "image_temp_tag_prefix=${image_temp_tag_prefix}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

  build-image:
    name: stage_mingw64-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64,riscv64,loong64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-stage-mingw64-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-tools-cache-

      - name: Build stage_mingw64 rootfs overlay
        run: |
          bash ./stage-mingw64/build.sh \
            --arch="${{ matrix.arch }}" \
            --clean \
            --pull \
            --jobs=4

      - name: Build, test, and push stage_mingw64 Docker image
        run: |
          bash ./stage-mingw64/image.sh \
            --arch="${{ matrix.arch }}" \
            --push \
            --tag="${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}-${{ matrix.arch }}"

  publish-image-manifest:
    name: publish-image-manifest
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-image

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image tags
        run: |
          image_repo="${{ needs.resolve-meta.outputs.image_repo }}"
          stable_tag="${{ needs.resolve-meta.outputs.stable_tag }}"
          dated_tag="${{ needs.resolve-meta.outputs.dated_tag }}"
          image_temp_tag_prefix="${{ needs.resolve-meta.outputs.image_temp_tag_prefix }}"

          docker buildx imagetools create \
            --tag "${image_repo}:${stable_tag}" \
            --tag "${image_repo}:${dated_tag}" \
            "${image_repo}:${image_temp_tag_prefix}-x86_64" \
            "${image_repo}:${image_temp_tag_prefix}-aarch64" \
            "${image_repo}:${image_temp_tag_prefix}-riscv64" \
            "${image_repo}:${image_temp_tag_prefix}-loongarch64"

  build-native-llvm:
    name: build-native-llvm
    runs-on: ubuntu-24.04
    needs:
      - resolve-meta
      - publish-image-manifest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-stage-mingw64-native-cache-v1
          restore-keys: |
            ${{ runner.os }}-stage-mingw64-native-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-

      - name: Build Windows-native LLVM/Clang
        run: |
          bash ./stage-mingw64/build_mingw64_native.sh \
            --clean \
            --pull \
            --jobs=4 \
            --image="${{ needs.resolve-meta.outputs.image_repo }}:${{ needs.resolve-meta.outputs.stable_tag }}"

      - name: Pack Windows-native LLVM/Clang
        run: |
          mkdir -p artifacts
          tar -C stage-mingw64/build/out/mingw64-native \
            -cJf "artifacts/stage-mingw64-native-${{ env.NATIVE_LLVM_VERSION }}-x86_64-w64-windows-gnu.tar.xz" \
            "${{ env.NATIVE_LLVM_VERSION }}"

      - name: Upload native LLVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: stage-mingw64-native-${{ env.NATIVE_LLVM_VERSION }}
          path: artifacts/stage-mingw64-native-${{ env.NATIVE_LLVM_VERSION }}-x86_64-w64-windows-gnu.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-native-llvm

    steps:
      - name: Download native LLVM artifact
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum ./*.tar.xz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-meta.outputs.release_tag }}
          name: ${{ needs.resolve-meta.outputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/SHA256SUMS
