name: package_cgal

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CGAL_PACKAGE_VERSION: ${{ inputs.cgal_version || '5.6.3' }}
  SFCGAL_PACKAGE_VERSION: ${{ inputs.sfcgal_version || '1.5.2' }}
  BOOST_PACKAGE_VERSION: ${{ inputs.boost_version || '1.84.0' }}
  GMP_PACKAGE_VERSION: ${{ inputs.gmp_version || '6.3.0' }}
  MPFR_PACKAGE_VERSION: ${{ inputs.mpfr_version || '4.2.2' }}

on:
  workflow_dispatch:
    inputs:
      cgal_version:
        description: "CGAL version to build and publish"
        required: false
        type: string
        default: "5.6.3"
      sfcgal_version:
        description: "SFCGAL version to build and publish"
        required: false
        type: string
        default: "1.5.2"
      boost_version:
        description: "Boost package version used as the base prefix"
        required: false
        type: string
        default: "1.84.0"
      gmp_version:
        description: "GMP version to build"
        required: false
        type: string
        default: "6.3.0"
      mpfr_version:
        description: "MPFR version to build"
        required: false
        type: string
        default: "4.2.2"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      boost_release_tag:
        description: "Release tag that contains boost-<version>-<triple>.tar.xz; defaults to boost-<boost_version>"
        required: false
        type: string
      boost_asset_prefix:
        description: "Asset prefix for Boost archives; defaults to boost-<boost_version>"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Releases as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      boost_release_tag: ${{ steps.meta.outputs.boost_release_tag }}
      boost_asset_prefix: ${{ steps.meta.outputs.boost_asset_prefix }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_CGAL_VERSION: ${{ inputs.cgal_version }}
          INPUT_SFCGAL_VERSION: ${{ inputs.sfcgal_version }}
          INPUT_BOOST_VERSION: ${{ inputs.boost_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_BOOST_RELEASE_TAG: ${{ inputs.boost_release_tag }}
          INPUT_BOOST_ASSET_PREFIX: ${{ inputs.boost_asset_prefix }}
        run: |
          set -euo pipefail

          cgal_version="${INPUT_CGAL_VERSION:-5.6.3}"
          sfcgal_version="${INPUT_SFCGAL_VERSION:-1.5.2}"
          boost_version="${INPUT_BOOST_VERSION:-1.84.0}"
          release_tag="cgal-${cgal_version}-sfcgal-${sfcgal_version}"

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          boost_release_tag="${INPUT_BOOST_RELEASE_TAG}"
          if [[ -z "${boost_release_tag}" ]]; then
            boost_release_tag="boost-${boost_version}"
          fi

          boost_asset_prefix="${INPUT_BOOST_ASSET_PREFIX}"
          if [[ -z "${boost_asset_prefix}" ]]; then
            boost_asset_prefix="boost-${boost_version}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "boost_release_tag=${boost_release_tag}"
            echo "boost_asset_prefix=${boost_asset_prefix}"
          } >> "${GITHUB_OUTPUT}"

  build-cgal:
    name: cgal-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            build_kind: linux
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            build_kind: linux-cross
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            build_kind: linux-cross
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            build_kind: linux-cross
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            build_kind: mingw64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux cross-build prerequisites
        if: ${{ matrix.build_kind == 'linux-cross' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-cgal-cache-v1
          restore-keys: |
            ${{ runner.os }}-package-cgal-cache-
            ${{ runner.os }}-package-boost-cache-
            ${{ runner.os }}-package-python-cache-
            ${{ runner.os }}-package-python-dependencies-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-python-cache-
            ${{ runner.os }}-stage1-cache-

      - name: Download Boost package archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPENDENCY_RELEASE_TAG: ${{ needs.resolve-meta.outputs.boost_release_tag }}
          DEPENDENCY_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.boost_asset_prefix }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/cgal/build/inputs
          dependency_asset="${DEPENDENCY_ASSET_PREFIX}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${DEPENDENCY_RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/cgal/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset}" >&2
          exit 1

      - name: Build CGAL/SFCGAL package
        run: |
          set -euo pipefail

          package_name="cgal-${{ env.CGAL_PACKAGE_VERSION }}-sfcgal-${{ env.SFCGAL_PACKAGE_VERSION }}-${{ matrix.triple }}"
          boost_archive="packages/cgal/build/inputs/${{ needs.resolve-meta.outputs.boost_asset_prefix }}-${{ matrix.triple }}.tar.xz"

          [[ -f "${boost_archive}" ]] || {
            echo "missing downloaded Boost archive: ${boost_archive}" >&2
            exit 1
          }

          bash ./packages/cgal/build.sh \
            --target="${{ matrix.target }}" \
            --boost-version="${{ env.BOOST_PACKAGE_VERSION }}" \
            --boost-archive="${boost_archive}" \
            --gmp-version="${{ env.GMP_PACKAGE_VERSION }}" \
            --mpfr-version="${{ env.MPFR_PACKAGE_VERSION }}" \
            --cgal-version="${{ env.CGAL_PACKAGE_VERSION }}" \
            --sfcgal-version="${{ env.SFCGAL_PACKAGE_VERSION }}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs=4

      - name: Upload CGAL/SFCGAL artifact
        uses: actions/upload-artifact@v7
        with:
          name: cgal-${{ matrix.target }}
          path: |
            packages/cgal/build/dist/cgal-${{ env.CGAL_PACKAGE_VERSION }}-sfcgal-${{ env.SFCGAL_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-cgal
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: cgal-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "CGAL ${{ env.CGAL_PACKAGE_VERSION }} and SFCGAL ${{ env.SFCGAL_PACKAGE_VERSION }} packages."
          fi

          gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" artifacts/*.tar.xz --clobber
