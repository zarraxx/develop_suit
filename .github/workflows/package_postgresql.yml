name: package_postgresql

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  POSTGRESQL_PACKAGE_VERSION: ${{ inputs.postgresql_version || '18.4' }}
  LLVM_SDK_VERSION: ${{ inputs.llvm_version || '18.1.8' }}

on:
  workflow_dispatch:
    inputs:
      postgresql_version:
        description: "PostgreSQL version to build and publish"
        required: false
        type: string
        default: "18.4"
      llvm_version:
        description: "LLVM SDK version used to enable PostgreSQL LLVM/JIT"
        required: false
        type: string
        default: "18.1.8"
      python_version:
        description: "Python package version used to enable PL/Python"
        required: false
        type: string
        default: "3.14.5"
      perl_version:
        description: "Perl package version used to enable PL/Perl"
        required: false
        type: string
        default: "5.42.2"
      tcl_version:
        description: "Tcl package version used to enable PL/Tcl"
        required: false
        type: string
        default: "8.6.18"
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      postgresql_dependencies_release_tag:
        description: "Release tag that contains postgresql_dependencies-<series>-<triple>.tar.xz; defaults to postgresql_dependencies-<major>"
        required: false
        type: string
      postgresql_dependencies_asset_prefix:
        description: "Asset prefix for PostgreSQL dependency archives; defaults to postgresql_dependencies-<major>"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Releases as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      postgresql_dependencies_release_tag: ${{ steps.meta.outputs.postgresql_dependencies_release_tag }}
      postgresql_dependencies_asset_prefix: ${{ steps.meta.outputs.postgresql_dependencies_asset_prefix }}
      python_release_tag: ${{ steps.meta.outputs.python_release_tag }}
      python_asset_prefix: ${{ steps.meta.outputs.python_asset_prefix }}
      perl_release_tag: ${{ steps.meta.outputs.perl_release_tag }}
      perl_asset_prefix: ${{ steps.meta.outputs.perl_asset_prefix }}
      tcl_release_tag: ${{ steps.meta.outputs.tcl_release_tag }}
      tcl_asset_prefix: ${{ steps.meta.outputs.tcl_asset_prefix }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_POSTGRESQL_VERSION: ${{ inputs.postgresql_version }}
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
          INPUT_PERL_VERSION: ${{ inputs.perl_version }}
          INPUT_TCL_VERSION: ${{ inputs.tcl_version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_POSTGRESQL_DEPENDENCIES_RELEASE_TAG: ${{ inputs.postgresql_dependencies_release_tag }}
          INPUT_POSTGRESQL_DEPENDENCIES_ASSET_PREFIX: ${{ inputs.postgresql_dependencies_asset_prefix }}
        run: |
          set -euo pipefail

          postgresql_version="${INPUT_POSTGRESQL_VERSION:-18.4}"
          python_version="${INPUT_PYTHON_VERSION:-3.14.5}"
          perl_version="${INPUT_PERL_VERSION:-5.42.2}"
          tcl_version="${INPUT_TCL_VERSION:-8.6.18}"
          release_tag="postgresql-${postgresql_version}"

          postgresql_major="${postgresql_version%%.*}"
          if [[ -z "${postgresql_major}" ]]; then
            echo "could not resolve PostgreSQL major version from: ${postgresql_version}" >&2
            exit 1
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          postgresql_dependencies_release_tag="${INPUT_POSTGRESQL_DEPENDENCIES_RELEASE_TAG}"
          if [[ -z "${postgresql_dependencies_release_tag}" ]]; then
            postgresql_dependencies_release_tag="postgresql_dependencies-${postgresql_major}"
          fi

          postgresql_dependencies_asset_prefix="${INPUT_POSTGRESQL_DEPENDENCIES_ASSET_PREFIX}"
          if [[ -z "${postgresql_dependencies_asset_prefix}" ]]; then
            postgresql_dependencies_asset_prefix="postgresql_dependencies-${postgresql_major}"
          fi

          python_release_tag="python-${python_version}"
          python_asset_prefix="python-${python_version}"
          perl_release_tag="perl-${perl_version}"
          perl_asset_prefix="perl-${perl_version}"
          tcl_release_tag="tcl-${tcl_version}"
          tcl_asset_prefix="tcl-${tcl_version}"

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "postgresql_dependencies_release_tag=${postgresql_dependencies_release_tag}"
            echo "postgresql_dependencies_asset_prefix=${postgresql_dependencies_asset_prefix}"
            echo "python_release_tag=${python_release_tag}"
            echo "python_asset_prefix=${python_asset_prefix}"
            echo "perl_release_tag=${perl_release_tag}"
            echo "perl_asset_prefix=${perl_asset_prefix}"
            echo "tcl_release_tag=${tcl_release_tag}"
            echo "tcl_asset_prefix=${tcl_asset_prefix}"
          } >> "${GITHUB_OUTPUT}"

  build-postgresql:
    name: postgresql-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            build_kind: linux
            jobs: 4
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            build_kind: linux-cross
            jobs: 4
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            build_kind: linux-cross
            jobs: 4
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            build_kind: linux-cross
            jobs: 4
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            build_kind: mingw64
            jobs: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux cross-build prerequisites
        if: ${{ matrix.build_kind == 'linux-cross' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-postgresql-cache-v1
          restore-keys: |
            ${{ runner.os }}-package-postgresql-cache-
            ${{ runner.os }}-package-postgresql-dependencies-cache-
            ${{ runner.os }}-package-python-dependencies-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-python-cache-
            ${{ runner.os }}-stage1-cache-

      - name: Download PostgreSQL dependency archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPENDENCY_RELEASE_TAG: ${{ needs.resolve-meta.outputs.postgresql_dependencies_release_tag }}
          DEPENDENCY_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.postgresql_dependencies_asset_prefix }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/postgresql/build/inputs
          dependency_asset="${DEPENDENCY_ASSET_PREFIX}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${DEPENDENCY_RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/postgresql/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset}" >&2
          exit 1

      - name: Download Python package archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPENDENCY_RELEASE_TAG: ${{ needs.resolve-meta.outputs.python_release_tag }}
          DEPENDENCY_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.python_asset_prefix }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/postgresql/build/inputs
          dependency_asset="${DEPENDENCY_ASSET_PREFIX}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${DEPENDENCY_RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/postgresql/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset}" >&2
          exit 1

      - name: Download Perl package archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPENDENCY_RELEASE_TAG: ${{ needs.resolve-meta.outputs.perl_release_tag }}
          DEPENDENCY_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.perl_asset_prefix }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/postgresql/build/inputs
          dependency_asset="${DEPENDENCY_ASSET_PREFIX}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${DEPENDENCY_RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/postgresql/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset}" >&2
          exit 1

      - name: Download Tcl package archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPENDENCY_RELEASE_TAG: ${{ needs.resolve-meta.outputs.tcl_release_tag }}
          DEPENDENCY_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.tcl_asset_prefix }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/postgresql/build/inputs
          dependency_asset="${DEPENDENCY_ASSET_PREFIX}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${DEPENDENCY_RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/postgresql/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset}" >&2
          exit 1

      - name: Download LLVM SDK archive
        if: ${{ matrix.target != 'riscv64' && matrix.target != 'loongarch64' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          LLVM_SDK_VERSION: ${{ env.LLVM_SDK_VERSION }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/postgresql/build/inputs
          release_tag="llvmsdk-${LLVM_SDK_VERSION}"
          dependency_asset="llvmsdk-${LLVM_SDK_VERSION}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${release_tag}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/postgresql/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${release_tag}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${release_tag}/${dependency_asset}" >&2
          exit 1

      - name: Build PostgreSQL package
        run: |
          set -euo pipefail

          package_name="postgresql-${{ env.POSTGRESQL_PACKAGE_VERSION }}-${{ matrix.triple }}"
          dependency_archive="packages/postgresql/build/inputs/${{ needs.resolve-meta.outputs.postgresql_dependencies_asset_prefix }}-${{ matrix.triple }}.tar.xz"
          llvmsdk_archive="packages/postgresql/build/inputs/llvmsdk-${{ env.LLVM_SDK_VERSION }}-${{ matrix.triple }}.tar.xz"
          [[ -f "${dependency_archive}" ]] || {
            echo "missing downloaded postgresql dependency archive: ${dependency_archive}" >&2
            exit 1
          }
          llvmsdk_args=()
          llvm_jit_args=()
          if [[ "${{ matrix.target }}" != "riscv64" && "${{ matrix.target }}" != "loongarch64" ]]; then
            [[ -f "${llvmsdk_archive}" ]] || {
              echo "missing downloaded LLVM SDK archive: ${llvmsdk_archive}" >&2
              exit 1
            }
            llvmsdk_args+=(--llvmsdk-archive="${llvmsdk_archive}")
            llvm_jit_args+=(--enable-llvm-jit)
          else
            llvm_jit_args+=(--disable-llvm-jit)
          fi

          bash ./packages/postgresql/build.sh \
            --target="${{ matrix.target }}" \
            --postgresql-version="${{ env.POSTGRESQL_PACKAGE_VERSION }}" \
            --llvm-version="${{ env.LLVM_SDK_VERSION }}" \
            --postgresql-deps-archive="${dependency_archive}" \
            "${llvmsdk_args[@]}" \
            "${llvm_jit_args[@]}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs="${{ matrix.jobs }}"

      - name: Upload PostgreSQL artifact
        uses: actions/upload-artifact@v7
        with:
          name: postgresql-${{ matrix.target }}
          path: |
            packages/postgresql/build/dist/postgresql-${{ env.POSTGRESQL_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  test-postgresql:
    name: test-postgresql-${{ matrix.target }}
    needs:
      - build-postgresql
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/amd64
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
            test_mode: linux-docker
            docker_platform: linux/arm64
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/riscv64
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04
            test_mode: linux-docker
            docker_platform: linux/loong64
          - target: mingw64
            triple: x86_64-w64-windows-gnu
            runs_on: windows-latest
            test_mode: mingw-native
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download PostgreSQL artifact
        uses: actions/download-artifact@v8
        with:
          name: postgresql-${{ matrix.target }}
          path: artifacts

      - name: Install Docker emulation prerequisites
        if: ${{ matrix.test_mode == 'linux-docker' && (matrix.target == 'riscv64' || matrix.target == 'loongarch64') }}
        uses: docker/setup-qemu-action@v3

      - name: Test PostgreSQL package in Docker
        if: ${{ matrix.test_mode == 'linux-docker' }}
        run: |
          set -euo pipefail

          archive_path="${GITHUB_WORKSPACE}/artifacts/postgresql-${{ env.POSTGRESQL_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          docker pull --platform "${{ matrix.docker_platform }}" ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e HOME=/tmp \
            ghcr.io/zarraxx/develop_suit:llvm-with-mingw64-18.1.8 \
            /bin/bash -lc "
              set -euo pipefail
              mkdir -p /etc /tmp/pgtester-home
              if [[ ! -f /etc/passwd ]]; then
                printf 'root:x:0:0:root:/root:/bin/sh\n' > /etc/passwd
              fi
              if ! grep -q '^pgtester:' /etc/passwd; then
                printf 'pgtester:x:1001:1001:pg tester:/tmp/pgtester-home:/bin/bash\n' >> /etc/passwd
              fi
              if [[ ! -f /etc/group ]]; then
                printf 'root:x:0:\n' > /etc/group
              fi
              if ! grep -q '^pgtester:' /etc/group; then
                printf 'pgtester:x:1001:\n' >> /etc/group
              fi
              chown -R 1001:1001 /tmp/pgtester-home
              exec su -s /bin/bash pgtester -c 'HOME=/tmp/pgtester-home TMPDIR=/tmp bash ./packages/postgresql/test_package.sh --target=${{ matrix.target }} --archive=/work/artifacts/postgresql-${{ env.POSTGRESQL_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz'
            "

      - name: Set up MSYS2 for Windows package test
        if: ${{ matrix.test_mode == 'mingw-native' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: tar

      - name: Test PostgreSQL package on Windows
        if: ${{ matrix.test_mode == 'mingw-native' }}
        shell: msys2 {0}
        env:
          POSTGRESQL_EXPECT_LLVM_JIT: "1"
        run: |
          set -euo pipefail
          archive_path="artifacts/postgresql-${{ env.POSTGRESQL_PACKAGE_VERSION }}-${{ matrix.triple }}.tar.xz"
          [[ -f "${archive_path}" ]] || {
            echo "missing package artifact: ${archive_path}" >&2
            exit 1
          }

          bash ./packages/postgresql/test_package_mingw64.sh \
            --target="${{ matrix.target }}" \
            --archive="${archive_path}"

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - test-postgresql
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: postgresql-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "PostgreSQL ${{ env.POSTGRESQL_PACKAGE_VERSION }} packages."
          fi

          gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" artifacts/*.tar.xz --clobber
