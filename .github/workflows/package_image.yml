name: package_image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release after building"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "Release tag"
        required: false
        type: string
        default: image
      release_name:
        description: "Release title, defaults to release_tag"
        required: false
        type: string
      postgresql_dependencies_release_tag:
        description: "Release tag that contains postgresql_dependencies-18-<triple>.tar.xz"
        required: false
        type: string
        default: postgresql_dependencies-18
      postgresql_dependencies_asset_prefix:
        description: "Asset prefix for PostgreSQL dependency archives"
        required: false
        type: string
        default: postgresql_dependencies-18
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-meta:
    name: resolve-meta
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      postgresql_dependencies_release_tag: ${{ steps.meta.outputs.postgresql_dependencies_release_tag }}
      postgresql_dependencies_asset_prefix: ${{ steps.meta.outputs.postgresql_dependencies_asset_prefix }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_POSTGRESQL_DEPENDENCIES_RELEASE_TAG: ${{ inputs.postgresql_dependencies_release_tag }}
          INPUT_POSTGRESQL_DEPENDENCIES_ASSET_PREFIX: ${{ inputs.postgresql_dependencies_asset_prefix }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_RELEASE_TAG}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="image"
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          postgresql_dependencies_release_tag="${INPUT_POSTGRESQL_DEPENDENCIES_RELEASE_TAG}"
          if [[ -z "${postgresql_dependencies_release_tag}" ]]; then
            postgresql_dependencies_release_tag="postgresql_dependencies-18"
          fi

          postgresql_dependencies_asset_prefix="${INPUT_POSTGRESQL_DEPENDENCIES_ASSET_PREFIX}"
          if [[ -z "${postgresql_dependencies_asset_prefix}" ]]; then
            postgresql_dependencies_asset_prefix="postgresql_dependencies-18"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "postgresql_dependencies_release_tag=${postgresql_dependencies_release_tag}"
            echo "postgresql_dependencies_asset_prefix=${postgresql_dependencies_asset_prefix}"
          } >> "${GITHUB_OUTPUT}"

  build-image:
    name: image-${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: resolve-meta
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            triple: x86_64-unknown-linux-gnu
          - target: aarch64
            triple: aarch64-unknown-linux-gnu
          - target: riscv64
            triple: riscv64-unknown-linux-gnu
          - target: loongarch64
            triple: loongarch64-unknown-linux-gnu
          - target: mingw64
            triple: x86_64-w64-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache source archives
        uses: actions/cache@v5
        with:
          path: cache
          key: ${{ runner.os }}-package-image-cache-v1
          restore-keys: |
            ${{ runner.os }}-package-image-cache-
            ${{ runner.os }}-package-postgresql-dependencies-cache-
            ${{ runner.os }}-package-python-dependencies-cache-
            ${{ runner.os }}-package-llvm-dependencies-cache-
            ${{ runner.os }}-package-llvmsdk-cache-
            ${{ runner.os }}-stage-mingw64-cache-
            ${{ runner.os }}-stage-llvm-cache-
            ${{ runner.os }}-stage-python-cache-
            ${{ runner.os }}-stage1-cache-

      - name: Download PostgreSQL dependency archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPENDENCY_RELEASE_TAG: ${{ needs.resolve-meta.outputs.postgresql_dependencies_release_tag }}
          DEPENDENCY_ASSET_PREFIX: ${{ needs.resolve-meta.outputs.postgresql_dependencies_asset_prefix }}
          DEPENDENCY_TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail

          mkdir -p packages/image/build/inputs
          dependency_asset="${DEPENDENCY_ASSET_PREFIX}-${DEPENDENCY_TRIPLE}.tar.xz"

          for attempt in $(seq 1 72); do
            if gh release download "${DEPENDENCY_RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --pattern "${dependency_asset}" \
              --dir packages/image/build/inputs; then
              exit 0
            fi

            echo "dependency asset not ready yet: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset} (attempt ${attempt}/72)"
            sleep 300
          done

          echo "timed out waiting for dependency asset: ${DEPENDENCY_RELEASE_TAG}/${dependency_asset}" >&2
          exit 1

      - name: Build image package
        run: |
          set -euo pipefail

          package_name="image-${{ matrix.triple }}"
          dependency_archive="packages/image/build/inputs/${{ needs.resolve-meta.outputs.postgresql_dependencies_asset_prefix }}-${{ matrix.triple }}.tar.xz"
          [[ -f "${dependency_archive}" ]] || {
            echo "missing downloaded postgresql dependency archive: ${dependency_archive}" >&2
            exit 1
          }

          bash ./packages/image/build.sh \
            --target="${{ matrix.target }}" \
            --postgresql-deps-archive="${dependency_archive}" \
            --package-name="${package_name}" \
            --clean \
            --pull \
            --jobs=4

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.target }}
          path: |
            packages/image/build/dist/image-${{ matrix.triple }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-image
    if: ${{ inputs.publish_release }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: image-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-meta.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.resolve-meta.outputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GH_REPO}" \
              --title "${RELEASE_NAME}" \
              "${prerelease_flag[@]}" \
              --notes "Image codec dependency packages."
          fi

          gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" artifacts/*.tar.xz --clobber
